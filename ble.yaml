# ================================
# BLE – Scanner für BTHome v2
#
# esp32_hosted (ESP32-C6 via SDIO) ist extern definiert.
# Hier nur BLE-Scanner und Sensoren.
#
# BLE-Empfangsseite:
#   - BTHome v2 Advertisements von DS18B20-BLE-Bridge (ESP32-C3)
#   - Externe Komponente: github://dz0ny/esphome-bthome (bthome_receiver)
# ================================

external_components:
  - source:
      type: git
      url: https://github.com/dz0ny/esphome-bthome
      ref: main
    components: [bthome_receiver]

esp32_ble_tracker:
  scan_parameters:
    active: false          # kein Active Scan → spart Strom, reicht für BTHome
    interval: 320ms
    window: 30ms
    continuous: true

bthome_receiver:
  devices:
    - mac_address: "dc:da:0c:a1:89:8e"
      name: "DS18B20 BLE-Bridge"

# ── Temperatursensor (BTHome v2) ─────────────────────────────────────────────

sensor:
  - platform: bthome_receiver
    mac_address: "dc:da:0c:a1:89:8e"
    temperature:
      id: sensor_temp_becken
      name: "Temperatur Becken"
      accuracy_decimals: 1
      filters:
        - throttle: 3s
      on_value:
        - lvgl.widget.refresh: lbl_temp_becken
