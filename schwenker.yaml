# ============================================================
# Schwenker – Sinus-Pendelbewegung via F5 (MKS Servo42D CAN)
# ============================================================
#
# Speed-Sinus:
#   → speed = max_rpm × sin(π × t / T_half),  Ziel = ±8.000.000 (∞)
#   → Motor-internes acc glättet die 50ms-Stufen
#   → Speed-Auflösung: 1 RPM-Stufe
#
# F5-Format (verifiziert, offizielle Doku):
#   { 0xF5, spd_H, spd_L, acc, pos_HH, pos_H, pos_L } + CRC
#   speed:   0–3000 RPM  (2 Byte)
#   acc:     1–254  = Motor interpoliert intern  |  0/255 = kein Ramping
#   absAxis: int24_t, −8388607 … +8388607  (3 Byte Two's Complement)
#
# Parameter:
#   sw_halbperiode_ms :  Zeit pro Richtung in ms  (default: 3000 ms)
#   sw_max_speed_rpm  :  Scheitel-RPM
#   sw_acc            :  10–100 % der Halbperiode für Rampen (acc+dec zusammen)
#                        100 % = purer Sinus (kein Plateau) | 50 % = 25 % rauf, 50 % Plateau, 25 % runter
#   sw_motor_ramp     :  Motor-internes acc-Byte (1–254) für 50ms-Stufenglättung
#
# ============================================================
# ── Komponenten ──────────────────────────────────────────────────────────────────
#  globals:  sw_aktiv, sw_richtung, sw_phase_ms, sw_halbperiode_ms,
#            sw_max_speed_rpm, sw_acc, sw_motor_ramp, sw_work_current_mA,
#            sw_motor_last_move_ms, sw_motor_busy, sw_stop_pending,
#            slider_trim_last, pumpe_a_aktiv,
#            preset[1..5]_hp_ms / _rpm / _acc
#            dr_aktiv, dr_modus, dr_speed_rpm, dr_acc, dr_richtung, dr_motor_mode
#            dr_pumpe_auto
#            drp[1..5]_rpm / _acc / _richtung / _mode / _pumpe
#  script:   script_schwenker_settings_open, script_schwenker_start,
#            script_schwenker_stop, script_schwenker_goto_slot,
#            script_motor_reboot, script_pumpe_a_kurz, script_pumpe_a_lang,
#            script_pumpe_a_aus, script_system_ein, script_system_aus,
#            script_drehen_start, script_drehen_stop, script_drehen_settings_open
#  button:   btn_schwenker_toggle
#  interval: (kein id)
# ─────────────────────────────────────────────────────────────────────────────────

globals:
  # ── Laufzustand ──────────────────────────────────────────
  - id: sw_aktiv
    type: bool
    restore_value: no
    initial_value: 'false'

  # ── Speed-Sinus ──────────────────────────────────────────────
  - id: sw_richtung
    type: int
    restore_value: no
    initial_value: '1'          # +1 = Richtung CW, -1 = CCW

  - id: sw_phase_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'          # Fortschritt innerhalb der aktuellen Halbperiode

  # ── Konfiguration ─────────────────────────────────────────────
  - id: sw_halbperiode_ms
    type: uint32_t
    restore_value: yes
    initial_value: '3000'       # 3 s pro Richtung

  - id: sw_max_speed_rpm
    type: int
    restore_value: yes
    initial_value: '100'        # RPM am Sinus-Scheitel

  - id: sw_acc
    type: int
    restore_value: yes
    initial_value: '100'        # 10–100 %: Anteil der Halbperiode für Rampen (acc+dec zusammen)
                                # 100 % = purer Sinus (wie bisher) | 50 % = 25% rauf, Plateau, 25% runter

  - id: sw_motor_ramp           # Motor-internes acc-Byte für F5 (glättet 50ms-Stufen)
    type: int
    restore_value: yes
    initial_value: '200'        # 1–254: Motor interpoliert intern | 0/255 = Ruck!

  - id: sw_work_current_mA    # Arbeitsstrom in mA – aus Einstellungs-Slider gespeichert
    type: int
    restore_value: yes
    initial_value: '1000'       # 500–2000 mA

  - id: sw_motor_last_move_ms  # millis() beim letzten Motorstop – 0 = Timeout inaktiv
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: sw_motor_busy          # true = Motor läuft aktiv (Idle-Timeout gesperrt)
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: sw_stop_pending        # true = Stop nach aktuellem Halbzyklus
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: sw_auto_stop_armed     # true = Schwenker soll stoppen wenn alle Timer/CDs enden
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: sw_auto_stop_slot      # Slot-Index (0-basiert) für Auto-Stop-Positionsfahrt
    type: int
    restore_value: no
    initial_value: '0'

  - id: slider_trim_last       # merkt sich den letzten Slider-Wert für Delta-Berechnung
    type: int
    restore_value: no
    initial_value: '0'

  - id: pumpe_a_aktiv          # Beckenfüllung aktiv (Pumpe A läuft)
    type: bool
    restore_value: no
    initial_value: 'false'

  # ── F4-Testmodus ──────────────────────────────────────────
  - id: sw_test_aktiv
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: sw_test_richtung       # +1 = CW, -1 = CCW
    type: int
    restore_value: no
    initial_value: '1'

  - id: sw_test_winkel         # Winkel pro Richtung in Grad
    type: float
    restore_value: yes
    initial_value: '20.0'

  - id: sw_test_speed          # Geschwindigkeit in RPM
    type: int
    restore_value: yes
    initial_value: '5'

  - id: sw_test_acc            # Beschleunigung 1–254
    type: int
    restore_value: yes
    initial_value: '50'

  # ── Schwenker-Presets ─────────────────────────────────────
  - id: preset1_hp_ms
    type: uint32_t
    restore_value: yes
    initial_value: '3200'   # 3.2 s
  - id: preset1_rpm
    type: int
    restore_value: yes
    initial_value: '4'

  - id: preset2_hp_ms
    type: uint32_t
    restore_value: yes
    initial_value: '2000'   # 2.0 s
  - id: preset2_rpm
    type: int
    restore_value: yes
    initial_value: '8'

  - id: preset3_hp_ms
    type: uint32_t
    restore_value: yes
    initial_value: '5000'   # 5.0 s
  - id: preset3_rpm
    type: int
    restore_value: yes
    initial_value: '12'

  - id: preset1_acc
    type: int
    restore_value: yes
    initial_value: '100'
  - id: preset2_acc
    type: int
    restore_value: yes
    initial_value: '100'
  - id: preset3_acc
    type: int
    restore_value: yes
    initial_value: '100'

  - id: preset4_hp_ms
    type: uint32_t
    restore_value: yes
    initial_value: '3000'   # 3.0 s
  - id: preset4_rpm
    type: int
    restore_value: yes
    initial_value: '6'
  - id: preset4_acc
    type: int
    restore_value: yes
    initial_value: '75'

  - id: preset5_hp_ms
    type: uint32_t
    restore_value: yes
    initial_value: '5000'   # 5.0 s
  - id: preset5_rpm
    type: int
    restore_value: yes
    initial_value: '20'
  - id: preset5_acc
    type: int
    restore_value: yes
    initial_value: '50'

  # ── Drehmodus ──────────────────────────────────────────────
  - id: dr_aktiv             # true = Drehmodus läuft
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: dr_modus             # letzter aktiver Modus: false=Schwenken, true=Drehen
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: dr_speed_rpm         # Drehgeschwindigkeit 1–150 UPM (echte UPM; F5-Wert = ×8 wegen 128 Sub)
    type: int
    restore_value: yes
    initial_value: '30'

  - id: dr_acc               # Motor-acc 1–254 (0/255 = kein Ramping!); Hardware-Rampe im Motor
    type: int
    restore_value: yes
    initial_value: '80'         # 80 ≈ ~3s auf 30 UPM; (256-80)*0.05ms×240steps=2.11s

  - id: dr_richtung          # +1 = CW, -1 = CCW
    type: int
    restore_value: yes
    initial_value: '1'

  - id: dr_motor_mode        # 4 = Closed Loop, 5 = FOC
    type: int
    restore_value: yes
    initial_value: '4'

  - id: dr_current_rpm       # aktuell gesendete Drehzahl (Software-Rampe)
    type: int
    restore_value: no
    initial_value: '0'

  - id: dr_ramp_last_ms      # millis() beim letzten Ramp-Schritt
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: dr_last_sent_rpm     # zuletzt per F5 gesendete Drehzahl (-1 = noch nie)
    type: int
    restore_value: no
    initial_value: '-1'

  - id: pumpe_vor_drehen_level  # DAC-Level vor Drehen (-1 = Pumpe war aus)
    type: float
    restore_value: no
    initial_value: '-1.0'

  - id: dr_pumpe_auto          # true = Beckenpumpe beim Drehmodus auf 100% setzen
    type: bool
    restore_value: yes
    initial_value: 'true'

  # ── Drehe-Presets ─────────────────────────────────────────
  - id: drp1_rpm
    type: int
    restore_value: yes
    initial_value: '20'
  - id: drp1_acc
    type: int
    restore_value: yes
    initial_value: '50'
  - id: drp1_richtung
    type: int
    restore_value: yes
    initial_value: '1'
  - id: drp1_mode
    type: int
    restore_value: yes
    initial_value: '4'
  - id: drp1_pumpe
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: drp2_rpm
    type: int
    restore_value: yes
    initial_value: '50'
  - id: drp2_acc
    type: int
    restore_value: yes
    initial_value: '100'
  - id: drp2_richtung
    type: int
    restore_value: yes
    initial_value: '1'
  - id: drp2_mode
    type: int
    restore_value: yes
    initial_value: '4'
  - id: drp2_pumpe
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: drp3_rpm
    type: int
    restore_value: yes
    initial_value: '80'
  - id: drp3_acc
    type: int
    restore_value: yes
    initial_value: '140'
  - id: drp3_richtung
    type: int
    restore_value: yes
    initial_value: '1'
  - id: drp3_mode
    type: int
    restore_value: yes
    initial_value: '4'
  - id: drp3_pumpe
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: drp4_rpm
    type: int
    restore_value: yes
    initial_value: '120'
  - id: drp4_acc
    type: int
    restore_value: yes
    initial_value: '180'
  - id: drp4_richtung
    type: int
    restore_value: yes
    initial_value: '-1'
  - id: drp4_mode
    type: int
    restore_value: yes
    initial_value: '4'
  - id: drp4_pumpe
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: drp5_rpm
    type: int
    restore_value: yes
    initial_value: '150'
  - id: drp5_acc
    type: int
    restore_value: yes
    initial_value: '220'
  - id: drp5_richtung
    type: int
    restore_value: yes
    initial_value: '1'
  - id: drp5_mode
    type: int
    restore_value: yes
    initial_value: '5'        # FOC
  - id: drp5_pumpe
    type: bool
    restore_value: yes
    initial_value: 'true'

# ============================================================
# Scripts
# ============================================================
script:
  # ── Schwenker-Overlay öffnen (Arcs + Labels + Trapez sync) ──
  - id: script_schwenker_settings_open
    mode: restart
    then:
      - lambda: |-
          lv_arc_set_value(id(arc_schwenkzeit), (int)(id(sw_halbperiode_ms) / 100));
          lv_arc_set_value(id(arc_rpm), id(sw_max_speed_rpm));
          lv_arc_set_value(id(arc_acc), id(sw_acc));
          int z = lv_arc_get_value(id(arc_schwenkzeit));
          int r = lv_arc_get_value(id(arc_rpm));
          int a = lv_arc_get_value(id(arc_acc));
          id(sw_halbperiode_ms) = (uint32_t)(z * 100);
          id(sw_max_speed_rpm)  = r;
          id(sw_acc)            = a;
          char b1[8]; snprintf(b1,sizeof(b1),"%.1fs", z / 10.0f);
          lv_label_set_text(id(lbl_arc_zeit_val), b1);
          char b2[6]; snprintf(b2,sizeof(b2),"%d", r);
          lv_label_set_text(id(lbl_arc_rpm_val), b2);
          char b3[6]; snprintf(b3,sizeof(b3),"%d%%", a);
          lv_label_set_text(id(lbl_arc_acc_val), b3);
          const char* sh;
          if(a>=80)      sh="/\\";
          else if(a>=55) sh="/_\\";
          else if(a>=35) sh="/___\\";
          else           sh="/_____\\";
          lv_label_set_text(id(lbl_trapez_shape), sh);
          // Tab auf gespeicherten Modus setzen (0=Schwenken, 1=Drehen)
          lv_tabview_set_act(id(tabview_schwenker), id(dr_modus) ? 1 : 0, LV_ANIM_OFF);
      - lvgl.widget.show: overlay_schwenker_settings

  # ── Starten ──────────────────────────────────────────────
  - id: script_schwenker_start
    mode: single              # mehrfaches Aufrufen ignoriert
    then:
      # Motor-Init: konfigurierbarer Modus, 64 Subdivisions, gespeicherter Strom, 5% Standby
      - lambda: |-
          // ── Drehen sofort hard-stoppen falls es noch läuft ────────────────
          // (Guard: btn_schwenker_overlay_toggle prüft dr_aktiv nicht)
          if (id(dr_aktiv)) {
            id(dr_aktiv)         = false;
            id(dr_current_rpm)   = 0;
            id(dr_last_sent_rpm) = -1;
            uint8_t _acc_b = 0x01;
            int32_t _stgt  = (int32_t)(id(dr_richtung)) * 8000000;
            uint32_t _sv   = (uint32_t)(_stgt) & 0x00FFFFFFU;
            id(can_bus)->send_data(${motor_can_id}, false,
                add_crc(${motor_can_id}, { 0xF5, 0x00, 0x00, _acc_b,
                    (uint8_t)((_sv>>16)&0xFF), (uint8_t)((_sv>>8)&0xFF), (uint8_t)(_sv&0xFF) }));
            if (id(pumpe_vor_drehen_level) >= 0.0f) {
              id(output_pumpe_dacA).set_level(id(pumpe_vor_drehen_level));
              id(pumpe_vor_drehen_level) = -1.0f;
            }
            lv_obj_set_style_bg_color(id(btn_dr_start_stop), lv_color_hex(0x666666), 0);
            ESP_LOGW("schwenker", "Drehen war aktiv – hard stop vor Schwenker-Start");
          }
          id(sw_motor_busy) = true;
          std::vector<unsigned char> data;
          data = add_crc(${motor_can_id}, { 0x82, 0x04 });         // MODE: Closed Loop (4)
          id(can_bus)->send_data(${motor_can_id}, false, data);
          ESP_LOGI("schwenker", "Motor-Modus: Closed Loop (4)");
          data = add_crc(${motor_can_id}, { 0x84, 0x40 });        // MSTEP: 64 subdivisions
          id(can_bus)->send_data(${motor_can_id}, false, data);
          int cur_ma = std::max(500, std::min(2000, id(sw_work_current_mA)));
          uint8_t cur_h = (uint8_t)(cur_ma >> 8);
          uint8_t cur_l = (uint8_t)(cur_ma & 0xFF);
          data = add_crc(${motor_can_id}, { 0x83, cur_h, cur_l });  // Work current aus NVS
          ESP_LOGI("schwenker", "Motor-Init: Work current = %d mA", cur_ma);
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x9B, 0x00 });        // Idle current: param 0 = min (~10%)
          id(can_bus)->send_data(${motor_can_id}, false, data);
      - delay: 150ms   # init settle
      - lambda: |-
          // NVS-Schutz: nur Höchstwert prüfen (> 3000 RPM wäre Blödsinn)
          if (id(sw_max_speed_rpm) < 1) id(sw_max_speed_rpm) = 1;
          if (id(sw_halbperiode_ms) < 1000 || id(sw_halbperiode_ms) > 10000) {
            id(sw_halbperiode_ms) = std::max((uint32_t)1000, std::min((uint32_t)10000, id(sw_halbperiode_ms)));
            lv_arc_set_value(id(arc_schwenkzeit), (int)(id(sw_halbperiode_ms) / 100));
            char buf[8]; snprintf(buf, sizeof(buf), "%.1fs", id(sw_halbperiode_ms) / 1000.0f);
            lv_label_set_text(id(lbl_arc_zeit_val), buf);
            ESP_LOGW("schwenker", "sw_halbperiode_ms korrigiert auf %u", id(sw_halbperiode_ms));
          }

          id(sw_richtung)     = 1;
          id(sw_phase_ms)     = 0;
          id(sw_stop_pending) = false;  // goto_slot kann dieses Flag hinterlassen → explizit löschen
          ESP_LOGI("schwenker", "START  halbperiode=%u ms  max=%d RPM",
                   id(sw_halbperiode_ms), id(sw_max_speed_rpm));
          id(sw_aktiv)     = true;
          id(dr_modus)     = false;   // Modus auf Schwenken speichern (NVS)
          lv_label_set_text(id(lbl_schwenker_icon), "\xef\x80\xa1");  // U+F021 arrows-rotate (Schwenken)
          lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0x229933), 0);
          lv_obj_set_style_bg_color(id(btn_schwenker_overlay_toggle), lv_color_hex(0x229933), 0);
          // Auto-Stop: Flag setzen wenn mindestens ein Slot läuft
          id(sw_auto_stop_armed) = false;
          for (int _s = 0; _s < 6; _s++) {
            if (id(slot_status)[_s] == 1) {
              id(sw_auto_stop_armed) = true;
              id(sw_auto_stop_slot)  = _s;
              ESP_LOGI("schwenker", "Auto-Stop armed: erster aktiver Slot=%d", _s + 1);
              break;
            }
          }

  # ── Stoppen ───────────────────────────────────────────────
  - id: script_schwenker_stop
    mode: single
    then:
      - lambda: |-
          if (!id(sw_aktiv)) {
            // Schwenker läuft nicht – sofortiger No-op
            id(sw_motor_busy) = false;
            id(sw_motor_last_move_ms) = millis();
            ESP_LOGI("schwenker", "STOP: war bereits inaktiv");
            return;
          }
          // Auto-Stop deaktivieren (manueller Stop)
          id(sw_auto_stop_armed) = false;
          // Prüfe ob ein fertiger Slot blinkt → ersten anfahren (goto_slot stoppt intern)
          esphome::binary_sensor::BinarySensor* blink_s[6] = {
            id(bin_slot1_blink), id(bin_slot2_blink), id(bin_slot3_blink),
            id(bin_slot4_blink), id(bin_slot5_blink), id(bin_slot6_blink),
          };
          for (int _b = 0; _b < 6; _b++) {
            if (blink_s[_b]->state) {
              ESP_LOGI("schwenker", "STOP: Slot %d blinkt, fahre an", _b + 1);
              id(script_schwenker_goto_slot)->execute(_b + 1);
              return;
            }
          }
          // Kein blinkender Slot → normaler Stop
          id(sw_stop_pending) = true;
          lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0xAA8800), 0);
          lv_obj_set_style_bg_color(id(btn_schwenker_overlay_toggle), lv_color_hex(0xAA8800), 0);
          ESP_LOGI("schwenker", "STOP angefordert – warte auf Zyklusende");

  # ── Schwenker fährt zu einem der 6 Slot-Positionen ───────
  #   Slot 1 = 0°, Slot 2 = 60°, Slot 3 = 120°,
  #   Slot 4 = 180°, Slot 5 = 240°, Slot 6 = 300°
  - id: script_schwenker_goto_slot
    mode: restart          # neuer Slot-Klick bricht laufende Fahrt ab und startet sofort neu
    parameters:
      slot: int
    then:
      - lambda: |-
          id(sw_motor_busy) = true;
      # ── Drehen stoppen falls es läuft ───────────────────
      - if:
          condition:
            lambda: return id(dr_aktiv);
          then:
            - lambda: |-
                id(dr_aktiv) = false;
                uint8_t _acc_b = (uint8_t)std::max(1, std::min(254, id(dr_acc)));
                int32_t _stgt  = (int32_t)(id(dr_richtung)) * 8000000;
                uint32_t _sv   = (uint32_t)(_stgt) & 0x00FFFFFFU;
                id(can_bus)->send_data(${motor_can_id}, false,
                    add_crc(${motor_can_id}, { 0xF5, 0x00, 0x00, _acc_b,
                        (uint8_t)((_sv>>16)&0xFF), (uint8_t)((_sv>>8)&0xFF), (uint8_t)(_sv&0xFF) }));
                lv_obj_set_style_bg_color(id(btn_dr_start_stop), lv_color_hex(0x666666), 0);
                lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0x666666), 0);
                ESP_LOGI("goto_slot", "Drehen gestoppt fuer Slot-Fahrt");
            - delay: 500ms
      # ── Schwenker sanft stoppen falls er läuft ───────────
      - if:
          condition:
            lambda: return id(sw_aktiv);
          then:
            - lambda: |-
                id(sw_stop_pending) = true;
                lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0xAA8800), 0);
                lv_obj_set_style_bg_color(id(btn_schwenker_overlay_toggle), lv_color_hex(0xAA8800), 0);
                ESP_LOGI("schwenker", "goto_slot: Schwenker läuft – warte auf Zyklusende");
            # Warten bis Interval den Halbzyklus beendet und sw_aktiv=false setzt
            - wait_until:
                condition:
                  lambda: return !id(sw_aktiv);
                timeout: 10s
            - delay: 200ms   # kurze Beruhigungspause nach dem Stop
      # Closed Loop + 64 Sub (zurück von Drehen-128Sub!) + Work current aus NVS laden
      - lambda: |-
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x82, 0x04 }));
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x84, 0x40 }));  // 64 Sub zurücksetzen!
          ESP_LOGI("schwenker", "goto_slot: Closed Loop + 64 Sub");
          id(script_motor_set_work_current_mA)->execute(id(sw_work_current_mA));
          ESP_LOGI("schwenker", "goto_slot: Work current = %d mA", id(sw_work_current_mA));
      # Relative Fahrt zur Zielposition
      - lambda: |-
          float current_raw = id(sensor_motor_position).state;
          if (isnan(current_raw)) {
            ESP_LOGW("schwenker", "goto_slot: sensor_motor_position NaN – Abbruch");
            return;
          }
          float current_deg = current_raw / 16384.0f * 360.0f;
          float target_deg  = (float)(slot - 1) * 60.0f;  // 1=0°, 2=60° …6=300°
          float rel         = target_deg - current_deg;
          // Kürzesten Weg wählen (±180°)
          while (rel >  180.0f) rel -= 360.0f;
          while (rel < -180.0f) rel += 360.0f;
          ESP_LOGI("schwenker", "goto_slot %d  target=%.1f°  aktuell=%.1f°  rel=%.1f°",
                   slot, target_deg, current_deg, rel);
          // 6 RPM + acc 10: sanft, ruckelfrei im Wasser
          // WICHTIG: acc muss ≥1 sein – acc=0 oder 255 = kein Ramping → harter Ruck!
          uint8_t slot_acc = 10;  // nie 0 setzen!
          if (slot_acc == 0) slot_acc = 1;
          id(script_motor_goto_relative_degree)->execute(6, slot_acc, rel);
      # Wartezeit: max. Weg ≈ 180° bei 6 RPM + acc 10 ≈ ~7 s
      - delay: 7000ms
      - lambda: |-
          // Sanfter Halt: F5 speed=0 mit acc=10 → Motor bremst kontrolliert
          // Danach FOC → kein Haltestrom
          uint8_t stop_acc = 10;  // nie 0 – 0 = sofortiger Ruck!
          int32_t target = (int32_t)(id(sw_richtung)) * 8000000;
          uint32_t val = (uint32_t)(target) & 0x00FFFFFFU;
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0xF5, 0x00, 0x00, stop_acc,
                  (uint8_t)((val>>16)&0xFF), (uint8_t)((val>>8)&0xFF), (uint8_t)(val&0xFF) }));
      - delay: 500ms
      - lambda: |-
          id(sw_motor_busy) = false;
          id(sw_motor_last_move_ms) = millis();
          ESP_LOGI("schwenker", "goto_slot fertig – Idle-Timeout aktiv");

  # ── Motor Soft-Reboot (Soll = Ist, manuell aus Einstellungen) ──────────
  - id: script_motor_reboot
    mode: single
    then:
      - lambda: |-
          ESP_LOGI("schwenker", "Motor Soft-Reboot (0x41) – Soll=Ist sync");
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x41 }));
      - delay: 2500ms   # Motor braucht ~2 s zum Hochfahren
      # Re-Init: Closed-Loop, 64 Steps, 1000 mA, Respond ON
      - lambda: |-
          std::vector<unsigned char> data;
          data = add_crc(${motor_can_id}, { 0x82, 0x04 });        // MODE: Closed Loop
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x84, 0x40 });        // MSTEP: 64 subdivisions
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x83, 0x03, 0xE8 });  // Work current: 1000 mA
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x9B, 0x00 });        // Idle current: min
          id(can_bus)->send_data(${motor_can_id}, false, data);
          data = add_crc(${motor_can_id}, { 0x8C, 0x01, 0x01 });  // Respond ON
          id(can_bus)->send_data(${motor_can_id}, false, data);
          ESP_LOGI("schwenker", "Motor Re-Init abgeschlossen");

  # ── Beckenfüllung Kurz (25% → 5% Dauer) ──────────────────
  - id: script_pumpe_a_kurz
    mode: restart
    then:
      - lambda: |-
          id(pumpe_a_aktiv) = true;
          id(output_pumpe_dacA).set_level(0.25f);  // 25% Anlauf
          lv_obj_set_style_bg_color(id(btn_beckenfuellung), lv_color_hex(0x2255CC), 0);
          ESP_LOGI("pumpe", "Beckenfüllung KURZ start");
      - delay: 300ms
      - lambda: |-
          id(output_pumpe_dacA).set_level(0.02f);  // 2% Dauer
          lv_slider_set_value(id(slider_turmpumpe), 2, LV_ANIM_OFF);

  # ── Beckenfüllung Lang (25% → 15% → 100% → 5% Dauer) ─────
  - id: script_pumpe_a_lang
    mode: restart
    then:
      - lambda: |-
          id(pumpe_a_aktiv) = true;
          id(output_pumpe_dacA).set_level(0.25f);  // 25% Anlauf
          lv_obj_set_style_bg_color(id(btn_beckenfuellung), lv_color_hex(0x2255CC), 0);
          ESP_LOGI("pumpe", "Beckenfüllung LANG start");
      #- delay: 300ms
      #- lambda: |-
      #    id(output_pumpe_dacA).set_level(0.02f);  // 15% Zwischenphase
      - delay: 1s
      - lambda: |-
          id(output_pumpe_dacA).set_level(1.0f);   // 100% Spülen
      - delay: 12000ms
      - lambda: |-
          id(output_pumpe_dacA).set_level(0.05f);  // 5% Dauer
          lv_slider_set_value(id(slider_turmpumpe), 5, LV_ANIM_OFF);

  # ── Beckenfüllung AUS ────────────────────────────────────
  - id: script_pumpe_a_aus
    mode: restart
    then:
      - lambda: |-
          id(pumpe_a_aktiv) = false;
          id(output_pumpe_dacA).set_level(0.0f);
          lv_obj_set_style_bg_color(id(btn_beckenfuellung), lv_color_hex(0x555555), 0);
          ESP_LOGI("pumpe", "Beckenfüllung AUS");

  # ── System EIN ───────────────────────────────────────────
  - id: script_system_ein
    mode: single
    then:
      - lambda: |-
          id(system_ein) = true;
          lv_obj_set_style_bg_color(id(btn_system_power), lv_color_hex(0x229933), 0);
          auto call = id(climate_thermostat).make_call();
          call.set_mode("cool");
          call.perform();
          ESP_LOGI("system", "EIN");

  # ── System AUS ───────────────────────────────────────────
  - id: script_system_aus
    mode: restart             # Notaus: zweiter Druck unterbricht und startet sofort erneut
    then:
      - lambda: |-
          id(system_ein) = false;
          lv_obj_set_style_bg_color(id(btn_system_power), lv_color_hex(0xAA2200), 0);
          id(script_schwenker_stop).execute();
          auto call = id(climate_thermostat).make_call();
          call.set_mode("off");
          call.perform();
          id(output_pumpe_dacA).turn_off();
          id(pumpe_a_aktiv) = false;
          lv_obj_set_style_bg_color(id(btn_beckenfuellung), lv_color_hex(0x555555), 0);
          if (id(dr_aktiv)) id(script_drehen_stop).execute();
          id(output_pumpe_dacB).turn_off();
          ESP_LOGI("system", "AUS");

  # ── Drehen: Einstellungs-Overlay syncen ──────────────────
  - id: script_drehen_settings_open
    mode: restart
    then:
      - lambda: |-
          int rpm = std::max(1, std::min(150, id(dr_speed_rpm)));
          int acc = std::max(1, std::min(254, id(dr_acc)));
          lv_arc_set_value(id(arc_dr_rpm), rpm);
          lv_arc_set_value(id(arc_dr_acc), acc);
          char b1[8]; snprintf(b1, sizeof(b1), "%d", rpm);
          lv_label_set_text(id(lbl_dr_rpm_val), b1);
          char b2[8]; snprintf(b2, sizeof(b2), "%d", acc);
          lv_label_set_text(id(lbl_dr_acc_val), b2);
          // Rampzeit anzeigen: speed_val × (256-acc) × 50µs
          float rt = (float)(rpm * 8) * (256 - acc) * 0.00005f;
          char b3[10]; snprintf(b3, sizeof(b3), "%.1fs", rt);
          lv_label_set_text(id(lbl_dr_ramp_info), b3);
          if (id(dr_richtung) > 0) {
            lv_label_set_text(id(lbl_dr_richtung), "Rechts \xef\x81\x8b");
            lv_obj_set_style_bg_color(id(btn_dr_richtung), lv_color_hex(0x1a6b4a), 0);
          } else {
            lv_label_set_text(id(lbl_dr_richtung), "Links \xef\x81\x8b");
            lv_obj_set_style_bg_color(id(btn_dr_richtung), lv_color_hex(0x1a4a6b), 0);
          }
          if (id(dr_motor_mode) == 4) {
            lv_label_set_text(id(lbl_dr_mode), "Closed Loop");
            lv_obj_set_style_bg_color(id(btn_dr_mode), lv_color_hex(0x553388), 0);
          } else {
            lv_label_set_text(id(lbl_dr_mode), "FOC");
            lv_obj_set_style_bg_color(id(btn_dr_mode), lv_color_hex(0x336688), 0);
          }
          lv_obj_set_style_bg_color(id(btn_dr_start_stop),
            id(dr_aktiv) ? lv_color_hex(0x229933) : lv_color_hex(0x666666), 0);
          // Pumpen-Auto-Button synchronisieren
          if (id(dr_pumpe_auto)) {
            lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe 100%");
            lv_obj_set_style_bg_color(id(btn_dr_pumpe_auto), lv_color_hex(0x1a5a8a), 0);
          } else {
            lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe: manuell");
            lv_obj_set_style_bg_color(id(btn_dr_pumpe_auto), lv_color_hex(0x555555), 0);
          }

  # ── Drehen starten ────────────────────────────────────────
  - id: script_drehen_start
    mode: single
    then:
      - lambda: |-
          // ── Schwenker sofort hard-stoppen falls er noch läuft ─────────────
          // (Bug-Guard: btn_dr_start_stop im Overlay prüft sw_aktiv nicht)
          if (id(sw_aktiv)) {
            id(sw_aktiv)       = false;
            id(sw_stop_pending)= false;
            uint8_t _sacc = (uint8_t)std::max(1, std::min(254, id(sw_motor_ramp)));
            int32_t _stgt = (int32_t)(id(sw_richtung)) * 8000000;
            uint32_t _sv  = (uint32_t)(_stgt) & 0x00FFFFFFU;
            id(can_bus)->send_data(${motor_can_id}, false,
                add_crc(${motor_can_id}, { 0xF5, 0x00, 0x00, _sacc,
                    (uint8_t)((_sv>>16)&0xFF), (uint8_t)((_sv>>8)&0xFF), (uint8_t)(_sv&0xFF) }));
            lv_obj_set_style_bg_color(id(btn_schwenker_overlay_toggle), lv_color_hex(0x666666), 0);
            ESP_LOGW("drehen", "Schwenker war aktiv – hard stop vor Drehen-Start");
          }
          id(sw_motor_busy) = true;
          uint8_t mode_byte = (id(dr_motor_mode) == 5) ? 0x05 : 0x04;
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0x82, mode_byte }));
          ESP_LOGI("drehen", "Motor-Modus: %d", (int)mode_byte);
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0x84, 0x80 }));  // 128 Subdivisions (Feinrampe)
          int cur_ma = std::max(500, std::min(2000, id(sw_work_current_mA)));
          uint8_t cur_h = (uint8_t)(cur_ma >> 8);
          uint8_t cur_l = (uint8_t)(cur_ma & 0xFF);
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0x83, cur_h, cur_l }));
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0x9B, 0x00 }));
          ESP_LOGI("drehen", "Strom: %d mA", cur_ma);
      - delay: 150ms
      - lambda: |-
          // 128 Subdivisions: echte UPM × 8 = F5-Speed-Wert
          // acc 1–254: Motor-Hardware-Rampe; 0/255 = kein Ramping!
          id(dr_speed_rpm) = std::max(1, std::min(150, id(dr_speed_rpm)));
          id(dr_acc)       = std::max(1, std::min(254, id(dr_acc)));
          int speed_val    = id(dr_speed_rpm) * 8;           // max 1200
          uint8_t acc_b    = (uint8_t)id(dr_acc);
          int32_t tgt      = (int32_t)(id(dr_richtung)) * 8000000;
          uint32_t tgtv    = (uint32_t)(tgt) & 0x00FFFFFFU;
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0xF5,
                  (uint8_t)(speed_val >> 8), (uint8_t)(speed_val & 0xFF), acc_b,
                  (uint8_t)((tgtv>>16)&0xFF), (uint8_t)((tgtv>>8)&0xFF), (uint8_t)(tgtv&0xFF) }));
          id(dr_aktiv)  = true;
          id(dr_modus)  = true;   // Modus auf Drehen speichern (NVS)
          lv_label_set_text(id(lbl_schwenker_icon), "\xef\x8b\xb9");  // U+F2F9 rotate-right (Drehen)
          // Pumpe auf 100% wenn AUTO-Modus aktiv und sie gerade läuft
          if (id(dr_pumpe_auto) && id(pumpe_a_aktiv)) {
            id(pumpe_vor_drehen_level) = lv_slider_get_value(id(slider_turmpumpe)) / 100.0f;
            id(output_pumpe_dacA).set_level(1.0f);
            ESP_LOGI("drehen", "Pumpe → 100%% (war %.2f)", id(pumpe_vor_drehen_level));
          } else {
            id(pumpe_vor_drehen_level) = -1.0f;
          }
          lv_obj_set_style_bg_color(id(btn_dr_start_stop), lv_color_hex(0x229933), 0);
          lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0x229933), 0);
          float ramp_s = (float)(id(dr_speed_rpm) * 8) * (256 - id(dr_acc)) * 0.00005f;
          ESP_LOGI("drehen", "START  %d UPM (F5=%d)  acc=%d  ramp=%.1fs  dir=%+d  mode=%d",
                   id(dr_speed_rpm), speed_val, id(dr_acc), ramp_s, id(dr_richtung), id(dr_motor_mode));

  # ── Drehen stoppen ────────────────────────────────────────
  - id: script_drehen_stop
    mode: single
    then:
      - lambda: |-
          if (!id(dr_aktiv)) {
            id(sw_motor_busy) = false;
            id(sw_motor_last_move_ms) = millis();
            ESP_LOGI("drehen", "STOP: war bereits inaktiv");
            return;
          }
          id(dr_aktiv)       = false;
          id(dr_current_rpm) = 0;
          id(dr_last_sent_rpm) = -1;
          // Pumpe zurück auf gespeicherten Level
          if (id(pumpe_vor_drehen_level) >= 0.0f) {
            id(output_pumpe_dacA).set_level(id(pumpe_vor_drehen_level));
            lv_slider_set_value(id(slider_turmpumpe), (int)(id(pumpe_vor_drehen_level)*100.0f+0.5f), LV_ANIM_OFF);
            ESP_LOGI("drehen", "Pumpe zurück: %.2f", id(pumpe_vor_drehen_level));
            id(pumpe_vor_drehen_level) = -1.0f;
          }
          // Stop: speed=0, gleicher acc wie beim Start → symmetrische Hardware-Bremse
          uint8_t acc_b = (uint8_t)std::max(1, std::min(254, id(dr_acc)));
          int32_t stgt  = (int32_t)(id(dr_richtung)) * 8000000;
          uint32_t sv   = (uint32_t)(stgt) & 0x00FFFFFFU;
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0xF5, 0x00, 0x00, acc_b,
                  (uint8_t)((sv>>16)&0xFF), (uint8_t)((sv>>8)&0xFF), (uint8_t)(sv&0xFF) }));
          lv_obj_set_style_bg_color(id(btn_dr_start_stop), lv_color_hex(0x666666), 0);
          lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0x666666), 0);
          id(sw_motor_busy) = false;
          id(sw_motor_last_move_ms) = millis();
          ESP_LOGI("drehen", "STOP: Bremsbefehl gesendet");
          // Prüfe blinkende Slots -> Slot anfahren wie beim Schwenken
          esphome::binary_sensor::BinarySensor* blink_s[6] = {
            id(bin_slot1_blink), id(bin_slot2_blink), id(bin_slot3_blink),
            id(bin_slot4_blink), id(bin_slot5_blink), id(bin_slot6_blink),
          };
          for (int _b = 0; _b < 6; _b++) {
            if (blink_s[_b]->state) {
              ESP_LOGI("drehen", "STOP: Slot %d blinkt, fahre an", _b+1);
              id(script_schwenker_goto_slot)->execute(_b+1);
              return;
            }
          }

# ============================================================
# Interval-Blöcke
#   10 ms – Motorposition (0x30)  → 100 Hz → LED-Ring immer frisch
#   50 ms – Sinus-Regelschleife   → 20 Hz
# ============================================================
interval:
  # ── Motorposition: 100 Hz – unabhängig vom 50ms-Regelzyklus ─────────────────
  - interval: 10ms
    then:
      - lambda: |-
          id(can_bus)->send_data(${motor_can_id}, false, add_crc(${motor_can_id}, { 0x30 }));

  # ── Schwenker-Regelzyklus: 20 Hz ───────────────────────────────────────────
  - interval: 50ms
    then:
      - lambda: |-
          // ── Motor-Idle-Timeout: 10 s nach letzter Bewegung → FOC + 100 mA ──────
          if (!id(sw_aktiv) && !id(dr_aktiv) && !id(sw_motor_busy)) {
            if (id(sw_motor_last_move_ms) != 0 &&
                (millis() - id(sw_motor_last_move_ms) > 10000)) {
              id(sw_motor_last_move_ms) = 0;
              id(can_bus)->send_data(${motor_can_id}, false,
                  add_crc(${motor_can_id}, { 0x82, 0x05 }));
              id(script_motor_set_work_current_mA)->execute(100);
              id(script_motor_set_idle_current_perc)->execute(10);
              ESP_LOGI("motor", "Idle-Timeout: FOC + 100 mA Arbeitsstrom + 10%% Idle-Strom (≈10 mA)");
            }
          }

          // ── Drehmodus: F5 einmalig in script_drehen_start gesendet – hier nichts tun ──
          if (id(dr_aktiv)) {
            return;
          }

          if (!id(sw_aktiv)) return;

          uint8_t acc   = (uint8_t)std::max(1, std::min(254, id(sw_motor_ramp)));
          int32_t target;

          // ══ Speed-Trapez: acc% der Halbperiode für Rampen, Rest Plateau ══
          id(sw_phase_ms) += 50;
          float T        = (float)id(sw_halbperiode_ms);
          float pct      = (float)std::max(10, std::min(100, id(sw_acc))) / 100.0f;
          float ramp_ms  = pct * T * 0.5f;  // Dauer einer Flanke
          float phase_f  = (float)id(sw_phase_ms);
          float sinval;
          if (phase_f < ramp_ms) {
            sinval = sinf((M_PI * 0.5f) * phase_f / ramp_ms);       // Hochrampe 0→1
          } else if (phase_f >= T - ramp_ms) {
            sinval = sinf((M_PI * 0.5f) * (T - phase_f) / ramp_ms); // Abrampe 1→0
          } else {
            sinval = 1.0f;  // Plateau
          }
          if (sinval < 0.0f) sinval = 0.0f;
          int speed  = (int)(id(sw_max_speed_rpm) * sinval);
          ESP_LOGD("schwenker", "Dir:%+d spd:%3d RPM sin:%.3f phase:%u",
                   id(sw_richtung), speed, sinval, id(sw_phase_ms));

          // Flip-Trigger: sinval ist bereits seit halbperiode_ms = 0 (Abrampe beendet),
          // die extra 250 ms geben dem Motor Zeit (acc=200 ≈ 280 ms Auslaufzeit) wirklich
          // auf 0 abzubremsen, bevor die neue Richtung befohlen wird.
          if (id(sw_phase_ms) >= id(sw_halbperiode_ms) + 250U) {
            if (id(sw_stop_pending)) {
              // Zyklus beendet: jetzt wirklich stoppen
              id(sw_stop_pending) = false;
              id(sw_aktiv) = false;
              uint8_t sacc = (uint8_t)std::max(1, std::min(254, id(sw_motor_ramp)));
              int32_t stgt = (int32_t)(id(sw_richtung)) * 8000000;
              uint32_t sv  = (uint32_t)(stgt) & 0x00FFFFFFU;
              id(can_bus)->send_data(${motor_can_id}, false,
                  add_crc(${motor_can_id}, { 0xF5, 0x00, 0x00, sacc,
                      (uint8_t)((sv>>16)&0xFF), (uint8_t)((sv>>8)&0xFF), (uint8_t)(sv&0xFF) }));
              lv_obj_set_style_bg_color(id(btn_schwenker_main), lv_color_hex(0x666666), 0);
              lv_obj_set_style_bg_color(id(btn_schwenker_overlay_toggle), lv_color_hex(0x666666), 0);
              id(sw_motor_busy) = false;
              id(sw_motor_last_move_ms) = millis();
              ESP_LOGI("schwenker", "STOP: Zyklus beendet, Motor bremst");
              return;
            }
            id(sw_richtung) = -(id(sw_richtung));   // explizites Negieren (nicht *=)
            id(sw_phase_ms) = 0;
            ESP_LOGI("schwenker", "Richtungswechsel → %+d", id(sw_richtung));
          }

          // target NACH dem Flip berechnen → Flip-Tick schickt bereits neue Richtung
          // mit speed=0 (sinval=0 für phase > halbperiode_ms durch Clamp oben)
          target = (int32_t)(id(sw_richtung)) * 8000000;

          // ══ F5 CAN-Paket senden ════════════════════════════════════════
          uint8_t  spd_h = (uint8_t)(speed >> 8);
          uint8_t  spd_l = (uint8_t)(speed & 0xFF);
          uint32_t val   = (uint32_t)(target) & 0x00FFFFFFU;
          uint8_t  p_hh  = (uint8_t)((val >> 16) & 0xFF);
          uint8_t  p_h   = (uint8_t)((val >>  8) & 0xFF);
          uint8_t  p_l   = (uint8_t)( val         & 0xFF);
          id(can_bus)->send_data(${motor_can_id}, false,
              add_crc(${motor_can_id}, { 0xF5, spd_h, spd_l, acc, p_hh, p_h, p_l }));

# ============================================================
# Button – Start / Stop Toggle
# ============================================================
button:
  - platform: template
    name: "Schwenker Start/Stop"
    id: btn_schwenker_toggle
    on_press:
      - lambda: |-
          if (id(dr_aktiv)) {
            id(script_drehen_stop).execute();
          } else if (id(sw_aktiv)) {
            id(script_schwenker_stop).execute();
          } else if (id(dr_modus)) {
            id(script_drehen_start).execute();
          } else {
            id(script_schwenker_start).execute();
          }

  - platform: template
    name: "System EIN"
    id: btn_web_system_ein
    on_press:
      - script.execute: script_system_ein

  - platform: template
    name: "System AUS (Not-Aus)"
    id: btn_web_system_aus
    on_press:
      - script.execute: script_system_aus


