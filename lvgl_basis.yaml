                              uint32_t now = millis();
                              if (now - last_ms_s1 < 400 && last_ms_s1 != 0) {
                                last_ms_s1 = 0;
                                if (id(slot_status)[i] == 1) id(slot_elapsed_ms)[i] += millis() - id(slot_start_ms)[i];
                                id(slot_elapsed_ms)[i] = 0; id(slot_start_ms)[i] = 0; id(slot_status)[i] = 0;
                                id(bin_slot1_blink)->publish_state(false);
                                lv_obj_set_style_bg_color(id(slot1_tab), lv_color_hex(0xFF0000), 0);
                                if (id(slot_is_countdown)[i]) {
                                  uint32_t s = id(slot_countdown_max_ms)[i] / 1000;
                                  char rb[8]; snprintf(rb, sizeof(rb), "%02u:%02u", (unsigned)(s/60), (unsigned)(s%60));
                                  lv_label_set_text(id(lbl_slot1_time), rb);
                                } else { lv_label_set_text(id(lbl_slot1_time), "00:00"); }
                                lv_label_set_text(id(lbl_slot1_symbol), "\xef\x81\x8b");
                                ESP_LOGI("timer", "Slot 1: Reset (DblClick)"); return;
