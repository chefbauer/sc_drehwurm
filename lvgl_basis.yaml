# ================================
# LVGL Display Configuration Package
# Display Drehwurm - Basis Konfiguration
# Display: 1024x600 Pixel
# 
# Diese Datei wird als Package importiert:
# packages:
#   lvgl_config: !include lvgl_basis.yaml
# ================================
# ── Komponenten ──────────────────────────────────────────────────────────────────
#  font:      font_title, font_normal, font_preset_num, font_tab, font_small,
#             font_clock, font_temp, font_icons, font_timer, font_arc_val, font_icon_xl
#  globals:   slot_start_ms, slot_elapsed_ms, slot_status,
#             slot_is_countdown, slot_countdown_max_ms,
#             overlay_tc_open_slot, overlay_tc_type, overlay_tc_seconds,
#             overlay_tc_mask,
#             brightness_auto_mode, brightness_auto_updating, system_ein
#  binary_sensor: bin_slot1_blink .. bin_slot6_blink  (template, internal)
#  script:    script_open_timer_overlay
#  interval:  500ms (Timer/Countdown-Anzeige + Blink + AMG), 10s (LVGL-Idle)
#  lvgl:      page_main, page_settings
# ─────────────────────────────────────────────────────────────────────────────────

# Font Definitionen (Top-Level, nicht unter lvgl!)
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 60
    bpp: 4
    glyphs: " -/CEKPSTacdeghiklmnoprstuwx"  # Timer/Cowntdown + Sensor-Phalanx + Schwenker Einstellungen

  - file: "gfonts://Roboto@400"
    id: font_normal
    size: 28
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°·–"

  - file: "gfonts://Noto+Sans+Symbols@400"
    id: font_preset_num
    size: 28
    bpp: 4
    glyphs: "①②③④⑤"

  - file: "gfonts://Roboto@400"
    id: font_tab
    size: 30
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°"

  - file: "gfonts://Roboto@700"
    id: font_small
    size: 18
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~°·–"

  # Uhrzeit-Font (Statusleiste hh:mm:ss)
  - file: "gfonts://Roboto@400"
    id: font_clock
    size: 22
    bpp: 4
    glyphs: "0123456789:- ,.DFMSaceghimnorstw"

  # Temperatur-Font (Statusleiste, gleiche Größe wie Schneeflocken-Symbol)
  - file: "gfonts://Roboto@400"
    id: font_temp
    size: 40
    bpp: 4
    glyphs: "0123456789.-°C "

  # Symbol-Font – Font Awesome Solid (Play/Pause/Schneeflocke/Einstellungen)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icons
    size: 40
    bpp: 4
    glyphs:
      - "\uF04B"  # Play
      - "\uF04C"  # Pause
      - "\uF2DC"  # Schneeflocke
      - "\uF013"  # Zahnrad (Einstellungen)
      - "\uF545"  # Ruler (ToF Distanz)
      - "\uF2C9"  # Thermometer-half (Temperatur)
      - "\uF043"  # Droplet (Luftfeuchtigkeit)
      - "\uF72E"  # Wind (Luftdruck)
      - "\uF6FC"  # Mountain (Höhe)
      - "\uF185"  # Sun (Licht)
      - "\uF05B"  # Crosshairs / Laser (IR)
      - "\uF011"  # Power (Ein/Aus)
      - "\uF773"  # Water (Beckenfüllung)
      - "\uF021"  # arrows-rotate (Schwenker Start/Stop)
      - "\uF186"  # Moon (Standby)
      - "\uF00D"  # xmark (X-Button)

  # Dot-Matrix Font für Timer-Anzeige
  - file: "fonts/5x7-dot-matrix.ttf"
    id: font_timer
    size: 38
    bpp: 1
    glyphs: "0123456789:"

  # Arc-Wert-Font (Schwenker-Overlay, groß)
  - file: "gfonts://Roboto@400"
    id: font_arc_val
    size: 56
    bpp: 4
    glyphs: "0123456789.s% AM"

  # Großes Drehsymbol für Schwenker-Button (Font Awesome arrows-rotate U+F021)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icon_xl
    size: 120
    bpp: 4
    glyphs:
      - "\uF021"  # arrows-rotate (Schwenken, links+rechts)
      - "\uF2F9"  # rotate-right  (Drehen, nur rechts)

  # IR-Temperatur-Overlay: Laser-Icon 80px (bewusst kleiner als Temp-Wert)
  - file: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/webfonts/fa-solid-900.ttf"
    id: font_icon_ts
    size: 80
    bpp: 4
    glyphs:
      - "\uF05B"  # Crosshairs / Laser (IR)

  # IR-Temperatur-Overlay: Temperaturwert 120px
  - file: "gfonts://Roboto@700"
    id: font_ts_xl
    size: 120
    bpp: 4
    glyphs: "0123456789.,-\xc2\xb0C "

# Timer-Globals für alle 6 Slots
# Status: 0=gestoppt  1=läuft  2=pausiert
globals:
  - id: slot_start_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_elapsed_ms
    type: std::array<uint32_t, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  - id: slot_status
    type: std::array<int, 6>
    restore_value: false
    initial_value: '{0, 0, 0, 0, 0, 0}'
  # Helligkeits-Automodus (VEML7700)
  - id: brightness_auto_mode
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: brightness_auto_updating
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: system_ein
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: global_leds_per_slot
    type: float
    restore_value: true
    initial_value: '9.0'
  # ── Timer / Countdown ──────────────────────────────────────
  - id: slot_is_countdown
    type: std::array<bool, 6>
    restore_value: false
    initial_value: '{false, false, false, false, false, false}'
  - id: slot_countdown_max_ms
    type: std::array<uint32_t, 6>
    restore_value: true
    initial_value: '{240000, 240000, 240000, 240000, 240000, 240000}'
  - id: overlay_tc_open_slot
    type: int
    restore_value: false
    initial_value: '0'
  - id: overlay_tc_type
    type: int
    restore_value: false
    initial_value: '0'
  - id: overlay_tc_seconds
    type: int
    restore_value: false
    initial_value: '240'  # 4 Minuten in Sekunden
  - id: overlay_tc_mask
    type: int
    restore_value: false
    initial_value: '1'
sensor:
  - platform: template
    id: sensor_leds_per_slot
    internal: true
    accuracy_decimals: 0

binary_sensor:
  - platform: template
    id: bin_slot1_blink
    internal: true
  - platform: template
    id: bin_slot2_blink
    internal: true
  - platform: template
    id: bin_slot3_blink
    internal: true
  - platform: template
    id: bin_slot4_blink
    internal: true
  - platform: template
    id: bin_slot5_blink
    internal: true
  - platform: template
    id: bin_slot6_blink
    internal: true

script:
  - id: script_open_timer_overlay
    parameters:
      slot_idx: int
    then:
      - lambda: |-
          id(overlay_tc_open_slot) = slot_idx;
          id(overlay_tc_type) = id(slot_is_countdown)[slot_idx] ? 1 : 0;
          // Sekunden aus gespeichertem Max-Wert, auf 30s-Raster einrasten
          int secs = (int)(id(slot_countdown_max_ms)[slot_idx] / 1000);
          secs = (secs / 30) * 30;
          if (secs < 30)  secs = 30;
          if (secs > 720) secs = 720;
          id(overlay_tc_seconds) = secs;
          id(overlay_tc_mask) = (1 << slot_idx);
          // Slot-Buttons: bg_color + text_color setzen
          const uint32_t fc[6]     = {0xFF0000,0xFFFF00,0x00FF00,0x00FFFF,0x0000FF,0xFF00FF};
          const uint32_t tc_on[6]  = {0xFFFFFF,0x111111,0x111111,0x111111,0xFFFFFF,0xFFFFFF};
          const uint32_t tc_off[6] = {0xCC0000,0x777700,0x006600,0x007777,0x0000CC,0xAA00AA};
          lv_obj_t* sb[6] = {
            id(btn_tc_s1), id(btn_tc_s2), id(btn_tc_s3),
            id(btn_tc_s4), id(btn_tc_s5), id(btn_tc_s6)
          };
          for (int s = 0; s < 6; s++) {
            bool on = (id(overlay_tc_mask) & (1 << s));
            lv_obj_set_style_bg_color(sb[s], lv_color_hex(on ? fc[s] : 0xFFFFFF), 0);
            lv_obj_set_style_text_color(lv_obj_get_child(sb[s], 0), lv_color_hex(on ? tc_on[s] : tc_off[s]), 0);
          }
          lv_obj_set_style_bg_opa(id(btn_tc_all), LV_OPA_COVER, 0);
          // Typ-Tabs
          if (id(overlay_tc_type) == 0) {
            lv_obj_set_style_bg_color(id(btn_tc_type_timer), lv_color_hex(0x334488), 0);
            lv_obj_set_style_bg_color(id(btn_tc_type_cd),    lv_color_hex(0xCCCCCC), 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_tc_type_timer), 0), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_tc_type_cd), 0),    lv_color_hex(0x333333), 0);
            lv_obj_clear_flag(id(obj_tc_timer_content), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(obj_tc_cd_content), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_set_style_bg_color(id(btn_tc_type_timer), lv_color_hex(0xCCCCCC), 0);
            lv_obj_set_style_bg_color(id(btn_tc_type_cd),    lv_color_hex(0x334488), 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_tc_type_timer), 0), lv_color_hex(0x333333), 0);
            lv_obj_set_style_text_color(lv_obj_get_child(id(btn_tc_type_cd), 0),    lv_color_hex(0xFFFFFF), 0);
            lv_obj_add_flag(id(obj_tc_timer_content), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(obj_tc_cd_content), LV_OBJ_FLAG_HIDDEN);
          }
          // Slider-Wert + Label
          lv_slider_set_value(id(slider_tc_minutes), id(overlay_tc_seconds), LV_ANIM_OFF);
          { int m = id(overlay_tc_seconds)/60, s2 = id(overlay_tc_seconds)%60;
            char buf[24];
            if (m == 0)       snprintf(buf, sizeof(buf), "%d sek", s2);
            else if (s2 == 0) snprintf(buf, sizeof(buf), "%d min", m);
            else              snprintf(buf, sizeof(buf), "%d:%02d", m, s2);
            lv_label_set_text(id(lbl_tc_minutes_val), buf); }
          // Overlay einblenden
          lv_obj_clear_flag(id(overlay_timer_cowntdown), LV_OBJ_FLAG_HIDDEN);

interval:
  - interval: 500ms
    then:
      - lambda: |-
          char buf[8];
          // ── Blink-Phase (500 ms Takt) ────────────────────────────────
          static bool tc_blink_phase = false;
          tc_blink_phase = !tc_blink_phase;
          lv_obj_t* slot_time_lbl[6] = {
            id(lbl_slot1_time), id(lbl_slot2_time), id(lbl_slot3_time),
            id(lbl_slot4_time), id(lbl_slot5_time), id(lbl_slot6_time)
          };
          lv_obj_t* slot_title_lbl[6] = {
            id(lbl_slot1_timer_title), id(lbl_slot2_timer_title), id(lbl_slot3_timer_title),
            id(lbl_slot4_timer_title), id(lbl_slot5_timer_title), id(lbl_slot6_timer_title)
          };
          lv_obj_t* slot_sym_lbl[6] = {
            id(lbl_slot1_symbol), id(lbl_slot2_symbol), id(lbl_slot3_symbol),
            id(lbl_slot4_symbol), id(lbl_slot5_symbol), id(lbl_slot6_symbol)
          };
          lv_obj_t* slot_tab_btn[6] = {
            id(slot1_tab), id(slot2_tab), id(slot3_tab),
            id(slot4_tab), id(slot5_tab), id(slot6_tab)
          };
          const uint32_t slot_fc[6] = {0xFF0000,0xFFFF00,0x00FF00,0x00FFFF,0x0000FF,0xFF00FF};
          esphome::binary_sensor::BinarySensor* blink_s[6] = {
            id(bin_slot1_blink), id(bin_slot2_blink), id(bin_slot3_blink),
            id(bin_slot4_blink), id(bin_slot5_blink), id(bin_slot6_blink),
          };
          for (int ii = 0; ii < 6; ii++) {
            // Titel: Timer / Countdown dynamisch
            lv_label_set_text(slot_title_lbl[ii], id(slot_is_countdown)[ii] ? "Countdown" : "Timer");
            // Blink: Tab-Farbe pulsieren lassen (bin_slotX_blink – safe in lambda)
            if (blink_s[ii]->state) {
              lv_obj_set_style_bg_color(slot_tab_btn[ii],
                tc_blink_phase ? lv_color_hex(slot_fc[ii]) : lv_color_hex(0x222222), 0);
            }
            if (id(slot_status)[ii] != 1) continue;
            uint32_t total_ms = id(slot_elapsed_ms)[ii] + (millis() - id(slot_start_ms)[ii]);
            if (id(slot_is_countdown)[ii]) {
              uint32_t max_ms = id(slot_countdown_max_ms)[ii];
              if (total_ms >= max_ms) {
                // Countdown abgelaufen: Alarm auslösen
                id(slot_elapsed_ms)[ii] = 0;
                id(slot_start_ms)[ii] = millis();
                id(slot_status)[ii] = 2;
                blink_s[ii]->publish_state(true);
                lv_label_set_text(slot_time_lbl[ii], "00:00");
                lv_label_set_text(slot_sym_lbl[ii], "\xef\x81\x8b");
              } else {
                uint32_t rem = max_ms - total_ms;
                uint32_t s = rem / 1000;
                snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s/60), (unsigned)(s%60));
                lv_label_set_text(slot_time_lbl[ii], buf);
              }
            } else {
              uint32_t s = total_ms / 1000;
              snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned)(s/60), (unsigned)(s%60));
              lv_label_set_text(slot_time_lbl[ii], buf);
            }
          }
          // AMG8833 Overlay aktualisieren wenn sichtbar
          if (!lv_obj_has_flag(id(overlay_amg8833), LV_OBJ_FLAG_HIDDEN)) {
            amg_update_cells(id(amg_pixel_temps).data());
          }
          // Uhrzeit in Statusleiste aktualisieren (SNTP)
          auto t = id(sntp_time).now();
          if (t.is_valid()) {
            char tbuf[9];
            snprintf(tbuf, sizeof(tbuf), "%02d:%02d:%02d", t.hour, t.minute, t.second);
            lv_label_set_text(id(lbl_status_clock), tbuf);
            static const char* wdays[] = {"Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"};
            char dbuf[24];
            int dow = t.day_of_week - 1;  // ESPHome: 1=Sonntag..7=Samstag → 0-basiert
            if (dow < 0 || dow > 6) dow = 0;  // Bounds check
            snprintf(dbuf, sizeof(dbuf), "%s, %02d.%02d.", wdays[dow], t.day_of_month, t.month);
            lv_label_set_text(id(lbl_status_date), dbuf);
          }
          // ── Auto-Stop: Schwenker stoppen + Slot anfahren wenn alle Timer/CDs enden ──
          if (id(sw_auto_stop_armed) && id(sw_aktiv)) {
            bool any_running = false;
            for (int _j = 0; _j < 6; _j++) {
              if (id(slot_status)[_j] == 1) { any_running = true; break; }
            }
            if (!any_running) {
              int target = id(sw_auto_stop_slot) + 1;  // 0-basiert → 1-basiert
              id(sw_auto_stop_armed) = false;
              ESP_LOGI("schwenker", "Auto-Stop: alle Timer beendet, fahre Slot %d an", target);
              id(script_schwenker_goto_slot)->execute(target);
            }
          }
          // ── Auto-Arm: dr_auto_stop_armed aktuell halten wenn Slot läuft ─────
          if (id(dr_aktiv)) {
            for (int _k = 0; _k < 6; _k++) {
              if (id(slot_status)[_k] == 1) {
                id(dr_auto_stop_armed) = true;
                break;
              }
            }
          }
          // ── Auto-Stop: Drehmodus stoppen wenn alle Timer/CDs enden ──────────────
          if (id(dr_auto_stop_armed) && id(dr_aktiv)) {
            bool any_running = false;
            for (int _j = 0; _j < 6; _j++) {
              if (id(slot_status)[_j] == 1) { any_running = true; break; }
            }
            if (!any_running) {
              id(dr_auto_stop_armed) = false;
              ESP_LOGI("drehen", "Auto-Stop: alle Timer beendet, stoppe Drehmodus");
              id(script_drehen_stop)->execute();
            }
          }
lvgl:
  log_level: INFO
  color_depth: 16
  
  # Farbdefinitionen (Helles Design)
  theme:
    obj:
      bg_color: 0xFFFFFF  # Weiß
      text_color: 0x000000  # Schwarz

  # Pages/Screens Definition
  pages:
    # ================================
    # PAGE 1: Hauptseite / Start
    # ================================
    - id: page_main
      widgets:
        # Haupt-Container
        - obj:
            id: main_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF  # Weiß
            bg_opa: COVER
            scrollable: false
            scrollbar_mode: "off"
            pad_all: 0
            widgets:
              # Titel oben mittig
              - label:
                  id: main_title
                  text: "SCK Schwippschwenker"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366  # Dunkelblau
                  text_align: CENTER

              # STOP-Button oben links — Verkehrszeichen-Optik (rot achteckig, STOP weiß)
              # on_click: sofortiger Notaus (system_aus)
              - button:
                  id: btn_stop_notaus
                  width: 80
                  height: 80
                  align: TOP_LEFT
                  x: 10
                  y: 10
                  radius: 8
                  bg_color: 0xCC0000
                  bg_opa: COVER
                  border_width: 4
                  border_color: 0xFF4444
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_click:
                    - lambda: |-
                        id(script_system_aus).execute();
                  widgets:
                    - label:
                        align: CENTER
                        text: "STOP"
                        text_font: font_title
                        text_color: 0xFFFFFF

              # System-Schalter rechts oben: Long Press = EIN/AUS toggle (nur Climate)
              # Short Press: keine Funktion mehr (dafür gibts den STOP-Button links)
              - button:
                  id: btn_system_power
                  width: 80
                  height: 80
                  align: TOP_RIGHT
                  x: -10
                  y: 10
                  radius: 40
                  bg_color: 0xAA2200
                  bg_opa: COVER
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_long_press:
                    - lambda: |-
                        if (id(system_ein)) {
                          id(script_system_aus).execute();
                        } else {
                          id(script_system_ein).execute();
                        }
                  widgets:
                    - label:
                        id: lbl_power_icon
                        align: CENTER
                        text: "\uF011"
                        text_font: font_icons
                        text_color: 0xFFFFFF
              
              # Beckenfüllungs-Button (rund, tangential 45° rechts unten am Ring)
              # Modi: 0=AUS(grau), 1=MANUELL(blau), 2=AUTO(grün)
              # Short: Cycle AUS→MANUELL→AUTO→AUS
              # Long:  TURBO (dann zurück zum vorherigen Modus)
              - button:
                  id: btn_beckenfuellung
                  width: 80
                  height: 80
                  align: CENTER
                  x: 156
                  y: 176
                  radius: 40
                  bg_color: 0x555555
                  bg_opa: COVER
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_short_click:
                    - lambda: |-
                        // Cycle: 0→1→2→0
                        int naechster = (id(pumpe_a_modus) + 1) % 3;
                        id(script_pumpe_set_modus)->execute(naechster);
                  on_long_press:
                    - lambda: |-
                        // TURBO: immer, script_pumpe_a_lang merkt Modus selbst
                        id(script_pumpe_a_kurz).stop();
                        id(script_pumpe_a_lang).execute();
                  widgets:
                    - label:  # Wellen-Icon: zentriert, semi-transparent als Hintergrund
                        align: CENTER
                        text: "\uF773"
                        text_font: font_icons
                        text_color: 0xFFFFFF
                        text_opa: 45%
                    - label:  # Modus-Overlay: A / M / leer (oben drüber)
                        id: lbl_pumpe_modus
                        align: CENTER
                        text: "A"
                        text_font: font_arc_val
                        text_color: 0xFFFFFF

              # Schwenker-Steuerung: Großer runder Toggle-Button
              - obj:
                  id: schwenker_ring
                  width: 360
                  height: 360
                  align: CENTER
                  y: 20
                  radius: 180
                  bg_color: 0x2299CC
                  bg_opa: COVER
                  border_width: 0
                  clickable: false
                  pad_all: 0
                  scrollable: false
                  scrollbar_mode: "off"
                  widgets:
                    # ── Ring-Border: als erstes Child → liegt unter allen anderen ──
                    - obj:
                        width: 360
                        height: 360
                        radius: 180
                        bg_opa: 0%
                        border_width: 6
                        border_color: 0x4455AA
                        align: CENTER
                        clickable: false
                        pad_all: 0
                    - button:
                        id: btn_schwenker_main
                        width: 196
                        height: 196
                        align: CENTER
                        radius: 98
                        bg_color: 0x666666
                        bg_opa: COVER
                        border_width: 0
                        shadow_width: 0
                        outline_width: 0
                        pad_all: 0
                        on_short_click:
                          - lambda: |-
                              if (id(dr_aktiv)) {
                                id(script_drehen_stop).execute();
                              } else if (id(sw_aktiv)) {
                                id(script_schwenker_stop).execute();
                              } else if (id(dr_modus)) {
                                id(script_drehen_start).execute();
                              } else {
                                id(script_schwenker_start).execute();
                              }
                        on_long_press:
                          - script.execute: script_schwenker_settings_open
                        widgets:
                          - label:
                              id: lbl_schwenker_icon
                              align: CENTER
                              text: "\uF021"
                              text_font: font_icon_xl
                              text_color: 0xFFFFFF
