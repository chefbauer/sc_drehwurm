# ================================
# LVGL Display Configuration Package
# Display Drehwurm - Basis Konfiguration
# Display: 1024x600 Pixel
# 
# Diese Datei wird als Package importiert:
# packages:
#   lvgl_config: !include lvgl_basis.yaml
# ================================

# Font Definitionen (Top-Level, nicht unter lvgl!)
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 60
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

  - file: "gfonts://Roboto@400"
    id: font_normal
    size: 28
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

  - file: "gfonts://Roboto@400"
    id: font_tab
    size: 30
    bpp: 4
    glyphs: " !\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyzäöüÄÖÜß{|}~"

# LVGL Configuration
lvgl:
  log_level: INFO
  color_depth: 16
  
  # Farbdefinitionen (Helles Design)
  theme:
    obj:
      bg_color: 0xFFFFFF  # Weiß
      text_color: 0x000000  # Schwarz

  # Pages/Screens Definition
  pages:
    # ================================
    # PAGE 1: Hauptseite / Start
    # ================================
    - id: page_main
      widgets:
        # Haupt-Container
        - obj:
            id: main_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF  # Weiß
            bg_opa: COVER
            widgets:
              # Titel oben mittig
              - label:
                  id: main_title
                  text: "Supercooler Drehwurm Kühler"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366  # Dunkelblau
                  text_align: CENTER
              
              # 3D-Behälter – Alles als echte Kreise, dann Y 50% stauchen
              # → Kreise werden zu Ellipsen (256=100%, 128=50%)
              - obj:
                  id: container_tank
                  width: 320
                  height: 840
                  align: CENTER
                  y: 0
                  bg_opa: TRANSP
                  border_width: 0
                  transform_scale_y: 128
                  widgets:
                    # Layer 1: Innenwand / Mantel (Rechteck, volle Höhe, zuerst)
                    - obj:
                        id: cyl_body
                        width: 300
                        height: 648
                        align: TOP_MID
                        y: 0
                        bg_color: 0x708090
                        border_width: 0
                        radius: 0
                    # Layer 2: Boden – echter Kreis (radius = Hälfte height)
                    #          → nach Stauchung: 300×150 Ellipse
                    - obj:
                        id: cyl_bottom
                        width: 300
                        height: 300
                        radius: 150
                        align: TOP_MID
                        y: 498
                        bg_color: 0x4A5A6A
                        border_width: 0
                    # Layer 3: Wasser-Körper (Rechteck, etwas schmäler als Wand)
                    - obj:
                        id: water_body
                        width: 260
                        height: 398
                        align: TOP_MID
                        y: 250
                        bg_color: 0x1E6BAF
                        border_width: 0
                        radius: 0
                    # Layer 4: Wasser-Oberfläche – echter Kreis
                    #          → nach Stauchung: ovale Wasserfläche
                    #          Mittelpunkt bei y=250 (80% Füllstand)
                    - obj:
                        id: water_surface
                        width: 260
                        height: 260
                        radius: 130
                        align: TOP_MID
                        y: 120
                        bg_color: 0x4AAEDD
                        border_width: 0
                    # Layer 5: Oberer Rand – Kreisring (bg TRANSP, nur Border)
                    #          → nach Stauchung: Ellipsenring / offene Öffnung
                    - obj:
                        id: cyl_rim
                        width: 300
                        height: 300
                        radius: 150
                        align: TOP_MID
                        y: 0
                        bg_opa: TRANSP
                        border_width: 14
                        border_color: 0x9AAABB
                        border_opa: COVER

              # Navigation Button zu Einstellungen
              - button:
                  id: btn_to_settings
                  width: 200
                  height: 60
                  align: BOTTOM_RIGHT
                  x: -20
                  y: -20
                  widgets:
                    - label:
                        text: "Einstellungen"
                        text_font: font_normal
                        text_color: 0xFFFFFF  # Weiß
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_settings

    # ================================
    # PAGE 2: Einstellungen
    # ================================
    - id: page_settings
      widgets:
        # Haupt-Container
        - obj:
            id: settings_container
            width: 1024
            height: 600
            bg_color: 0xFFFFFF
            bg_opa: COVER
            widgets:
              # Titel oben mittig
              - label:
                  id: settings_title
                  text: "Einstellungen"
                  align: TOP_MID
                  y: 20
                  text_font: font_title
                  text_color: 0x003366
                  text_align: CENTER

              # Tab-Ansicht
              - tabview:
                  id: settings_tabs
                  width: 1024
                  height: 490
                  align: TOP_MID
                  y: 100
                  tab_style:
                    bg_color: 0xE0E0E0
                    text_font: font_tab
                    text_color: 0x000000
                  tabs:
                    # Tab 1: Bildschirm
                    - name: "Bildschirm"
                      id: tab_bildschirm
                      widgets:
                        # Zeile: Helligkeit Label + Slider
                        - obj:
                            id: row_helligkeit
                            width: 960
                            height: 70
                            align: TOP_MID
                            y: 20
                            bg_opa: TRANSP
                            border_width: 0
                            widgets:
                              - label:
                                  id: lbl_helligkeit
                                  text: "Helligkeit"
                                  align: LEFT_MID
                                  x: 10
                                  text_font: font_normal
                                  text_color: 0x000000
                              - slider:
                                  id: slider_helligkeit
                                  width: 650
                                  height: 20
                                  align: RIGHT_MID
                                  x: -10
                                  min_value: 0
                                  max_value: 100
                                  value: 80
                                  on_value:
                                    - light.control:
                                        id: light_screen_background
                                        brightness: !lambda "return x / 100.0;"

                        # Farbtest-Quadrate (150 x 150)
                        - obj:
                            id: row_farben
                            width: 960
                            height: 170
                            align: TOP_MID
                            y: 110
                            bg_opa: TRANSP
                            border_width: 0
                            widgets:
                              - obj:
                                  id: sq_red
                                  width: 150
                                  height: 150
                                  align: CENTER
                                  x: -180
                                  bg_color: 0xFF0000
                                  bg_opa: COVER
                                  border_width: 0
                              - obj:
                                  id: sq_green
                                  width: 150
                                  height: 150
                                  align: CENTER
                                  x: 0
                                  bg_color: 0x00FF00
                                  bg_opa: COVER
                                  border_width: 0
                              - obj:
                                  id: sq_blue
                                  width: 150
                                  height: 150
                                  align: CENTER
                                  x: 180
                                  bg_color: 0x0000FF
                                  bg_opa: COVER
                                  border_width: 0

                    # Tab 2: System
                    - name: "System"
                      id: tab_system
                      widgets:
                        - label:
                            id: lbl_system_placeholder
                            text: "System-Einstellungen folgen..."
                            align: CENTER
                            text_font: font_normal
                            text_color: 0x000000

                    # Tab 3: Kuehler
                    - name: "Kühler"
                      id: tab_kuehler
                      widgets:
                        - label:
                            id: lbl_kuehler_placeholder
                            text: "Kuehler-Einstellungen folgen..."
                            align: CENTER
                            text_font: font_normal
                            text_color: 0x000000

              # Zurück Button
              - button:
                  id: btn_back
                  width: 200
                  height: 60
                  align: BOTTOM_LEFT
                  x: 20
                  y: -20
                  bg_color: 0x444444
                  widgets:
                    - label:
                        text: "Zurück"
                        text_font: font_normal
                        text_color: 0xFFFFFF
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_main
