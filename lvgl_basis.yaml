                                  value: 0
                                  on_value:
                                    - lambda: |-
                                        int new_val = x;
                                        int delta = new_val - id(slider_trim_last);
                                        if (delta != 0) {
                                          id(sw_motor_busy) = true;
                                          // Closed Loop + Work current vor jedem F4
                                          id(can_bus)->send_data(${motor_can_id}, false,
                                              add_crc(${motor_can_id}, { 0x82, 0x04 }));
                                          int trim_cur = std::max(500, std::min(2000, id(sw_work_current_mA)));
                                          uint8_t tc_h = (uint8_t)(trim_cur >> 8);
                                          uint8_t tc_l = (uint8_t)(trim_cur & 0xFF);
                                          id(can_bus)->send_data(${motor_can_id}, false,
                                              add_crc(${motor_can_id}, { 0x83, tc_h, tc_l }));
                                          uint8_t speed_h = 0;       // 60 RPM
                                          uint8_t speed_l = 60;
                                          uint8_t accel   = 80;
                                          int32_t steps = (int32_t)lround((16384.0 / 360.0) * (double)delta);
                                          uint32_t v24 = (uint32_t)steps & 0x00FFFFFFu;
                                          uint8_t pr_hh = (v24 >> 16) & 0xFF;
                                          uint8_t pr_h  = (v24 >>  8) & 0xFF;
                                          uint8_t pr_l  =  v24        & 0xFF;
                                          id(can_bus)->send_data(${motor_can_id}, false,
                                            add_crc(${motor_can_id}, { 0xF4, speed_h, speed_l, accel, pr_hh, pr_h, pr_l }));
                                          id(slider_trim_last) = new_val;
                                        }
                                  on_release:
                                    - lambda: |-
                                        id(slider_trim_last) = 0;
                                        id(sw_motor_busy) = false;
                                        id(sw_motor_last_move_ms) = millis();
                                    - script.execute: script_motor_set_zero
