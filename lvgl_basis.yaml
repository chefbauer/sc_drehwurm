                                  uint32_t s = id(slot_countdown_max_ms)[i] / 1000;
                                  char rb[8]; snprintf(rb, sizeof(rb), "%02u:%02u", (unsigned)(s/60), (unsigned)(s%60));
                                  lv_label_set_text(id(lbl_slot1_time), rb);
                                } else { lv_label_set_text(id(lbl_slot1_time), "00:00"); }
                                lv_label_set_text(id(lbl_slot1_symbol), "\xef\x81\x8b"); return;
                              }
                              if (id(slot_status)[i] == 0 || id(slot_status)[i] == 2) {
                                id(slot_start_ms)[i] = millis();
                                id(slot_status)[i] = 1;
