                                  align: LEFT_MID
                                  x: 240
                                  on_value:
                                    - lambda: |-
                                        auto call = id(climate_thermostat).make_call();
                                        if (x) {
                                          call.set_mode(CLIMATE_MODE_COOL);
                                        } else {
                                          call.set_mode(CLIMATE_MODE_OFF);
                                        }
                                        call.perform();
                        # Zeile: Temperatur Slider
                        - obj:
                            id: row_temp_slider
                            width: 960
                            height: 70
                            align: TOP_MID
                            y: 110
                            bg_opa: TRANSP
                            border_width: 0
                            widgets:
                              - label:
                                  id: lbl_temp_soll
                                  text: "Temperatur"
                                  align: LEFT_MID
                                  x: 10
                                  text_font: font_normal
                                  text_color: 0x000000
                              - slider:
                                  id: slider_temp
                                  width: 600
                                  height: 20
                                  align: RIGHT_MID
                                  x: -70
                                  min_value: 0
                                  max_value: 50
                                  value: 15
                                  on_value:
                                    - lambda: |-
                                        auto call = id(climate_thermostat).make_call();
                                        call.set_target_temperature(x / 10.0f);
                                        call.perform();
                                        char buf[8];
                                        snprintf(buf, sizeof(buf), "%.1f°", x / 10.0f);
                                        lv_label_set_text(id(lbl_temp_wert), buf);
                              - label:
                                  id: lbl_temp_wert
                                  text: "1.5°"
                                  align: RIGHT_MID
                                  x: -10
                                  text_font: font_normal
                                  text_color: 0x003366
                        # Zeile: Lüfter-Status
                        - obj:
                            id: row_luefter
                            width: 960
                            height: 70
                            align: TOP_MID
                            y: 280
                            bg_opa: TRANSP
                            border_width: 0
                            scrollable: false
                            scrollbar_mode: "off"
                            widgets:
                              - label:
                                  id: lbl_luefter
                                  text: "Lüfter"
                                  align: LEFT_MID
                                  x: 10
                                  text_font: font_normal
                                  text_color: 0x000000
                              - label:
                                  id: lbl_luefter_wert
                                  text: "-- %"
                                  align: LEFT_MID
                                  x: 240
                                  text_font: font_normal
                                  text_color: 0x003366
                        # Preset-Tasten
                        - obj:
                            id: row_temp_presets
                            width: 960
                            height: 70
                            align: TOP_MID
                            y: 200
                            bg_opa: TRANSP
                            border_width: 0
                            scrollable: false
                            scrollbar_mode: "off"
                            widgets:
                              - button:
                                  id: btn_preset_1
                                  width: 120
                                  height: 50
                                  align: LEFT_MID
                                  x: 290
                                  widgets:
                                    - label:
                                        text: "1°C"
                                        align: CENTER
                                        text_font: font_normal
                                        text_color: 0xFFFFFF
                                  on_click:
                                    - lambda: |-
                                        auto call = id(climate_thermostat).make_call();
                                        call.set_target_temperature(1.0f);
                                        call.perform();
                                        lv_slider_set_value(id(slider_temp), 10, LV_ANIM_OFF);
                                        lv_label_set_text(id(lbl_temp_wert), "1.0°");
                              - button:
                                  id: btn_preset_15
                                  width: 120
                                  height: 50
                                  align: LEFT_MID
                                  x: 420
                                  widgets:
                                    - label:
                                        text: "1.5°C"
                                        align: CENTER
                                        text_font: font_normal
                                        text_color: 0xFFFFFF
                                  on_click:
                                    - lambda: |-
                                        auto call = id(climate_thermostat).make_call();
                                        call.set_target_temperature(1.5f);
                                        call.perform();
                                        lv_slider_set_value(id(slider_temp), 15, LV_ANIM_OFF);
                                        lv_label_set_text(id(lbl_temp_wert), "1.5°");
                              - button:
                                  id: btn_preset_5
                                  width: 120
                                  height: 50
                                  align: LEFT_MID
                                  x: 550
                                  widgets:
                                    - label:
                                        text: "5°C"
                                        align: CENTER
                                        text_font: font_normal
                                        text_color: 0xFFFFFF
                                  on_click:
                                    - lambda: |-
                                        auto call = id(climate_thermostat).make_call();
                                        call.set_target_temperature(5.0f);
                                        call.perform();
                                        lv_slider_set_value(id(slider_temp), 50, LV_ANIM_OFF);
                                        lv_label_set_text(id(lbl_temp_wert), "5.0°");

                    # Tab 4: Test
                    - name: "Test"
                      id: tab_test
                      scrollable: true
                      widgets:
                        - label:
                            text: "(leer)"
                            align: CENTER
                            text_font: font_normal
                            text_color: 0x888888

              # Schließen-Button (rechts oben, wie Overlays)
              - button:
                  id: btn_back
                  width: 80
                  height: 60
                  align: TOP_RIGHT
                  x: -10
                  y: 10
                  bg_color: 0xCC3333
                  widgets:
                    - label:
                        text: "X"
                        text_font: font_normal
                        text_color: 0xFFFFFF
                        align: CENTER
                  on_click:
                    - lvgl.page.show: page_main
