                      y: -148
                  - label:
                      text: "0.88-0.94"
                      text_font: font_small
                      text_color: 0x22CC66
                      align: LEFT_MID
                      x: 88
                      y: -132

                  - obj:
                      width: 32
                      height: 2
                      align: LEFT_MID
                      x: 52
                      y: -108
                      bg_color: 0xFF8833
                      border_width: 0
                      radius: 0
                  - label:
                      text: "Dose m."
                      text_font: font_small
                      text_color: 0xFF8833
                      align: LEFT_MID
                      x: 88
                      y: -117
                  - label:
                      text: "0.75-0.94"
                      text_font: font_small
                      text_color: 0xFF8833
                      align: LEFT_MID
                      x: 88
                      y: -101

                  - obj:
                      width: 32
