            # ── Material & Farb-Auswahl (unten) ───────────────────────────────────
            # Emissivitätstabelle (3 Materialien × 6 Farben):
            #   Farben:  0=schwarz, 1=dunkel(grün), 2=mitte(blau), 3=hell(rot/gelb), 4=weiß, 5=silber
            #   Glas:    0.93  0.92  0.91  0.90  0.89  0.87
            #   Dose m:  0.94  0.90  0.86  0.82  0.78  0.25
