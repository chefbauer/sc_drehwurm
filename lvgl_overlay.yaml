                                               id(preset3_hp_ms)/1000.0f,id(preset3_rpm),id(preset3_acc));
                                      lv_label_set_text(id(lbl_preset3_vals), buf);
                                      ESP_LOGI("preset","P3 gespeichert");
                            # P4
                            - button:
                                id: btn_preset4
                                width: 178
                                height: 80
                                align: LEFT_MID
                                x: 581
                                bg_color: 0x223355
                                border_width: 2
                                border_color: 0x4477AA
                                radius: 12
                                widgets:
                                  - label:
                                      id: lbl_preset4_name
                                      text: "④"
                                      align: TOP_LEFT
                                      x: 12
                                      y: 8
                                      text_font: font_preset_num
                                      text_color: 0xFFFFFF
                                  - label:
                                      id: lbl_preset4_vals
                                      text: "3.0s \xc2\xb7 6 Upm \xc2\xb7 75%"
                                      align: BOTTOM_MID
                                      y: -8
                                      text_font: font_small
                                      text_color: 0xAABBFF
                                on_short_click:
                                  - lambda: |-
                                      id(sw_halbperiode_ms) = id(preset4_hp_ms);
                                      id(sw_max_speed_rpm)  = id(preset4_rpm);
