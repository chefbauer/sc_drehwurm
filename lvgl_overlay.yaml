                            char b1[8]; snprintf(b1,sizeof(b1),"%.1fs",id(preset5_hp_ms)/1000.0f);
                            lv_label_set_text(id(lbl_arc_zeit_val), b1);
                            char b2[6]; snprintf(b2,sizeof(b2),"%d",id(preset5_rpm));
                            lv_label_set_text(id(lbl_arc_rpm_val), b2);
                            char b3[8]; snprintf(b3,sizeof(b3),"%d%%",id(preset5_acc));
                            lv_label_set_text(id(lbl_arc_acc_val), b3);
                            int a=id(preset5_acc); const char* sh;
                            if(a>=80) sh="/\\";
                            else if(a>=55) sh="/_\\";
                            else if(a>=35) sh="/___\\";
                            else sh="/_____\\";
                            lv_label_set_text(id(lbl_trapez_shape), sh);
                            ESP_LOGI("preset","P5 geladen: %ums %dRPM %d%%",id(preset5_hp_ms),id(preset5_rpm),id(preset5_acc));
                      on_long_press:
                        - lambda: |-
                            id(preset5_hp_ms) = id(sw_halbperiode_ms);
                            id(preset5_rpm)   = id(sw_max_speed_rpm);
                            id(preset5_acc)   = id(sw_acc);
                            char buf[28];
                            snprintf(buf,sizeof(buf),"%.1fs \xc2\xb7 %d Upm \xc2\xb7 %d%%",
                                     id(preset5_hp_ms)/1000.0f,id(preset5_rpm),id(preset5_acc));
                            lv_label_set_text(id(lbl_preset5_vals), buf);
                            ESP_LOGI("preset","P5 gespeichert: %ums %dRPM %d%%",id(preset5_hp_ms),id(preset5_rpm),id(preset5_acc));

