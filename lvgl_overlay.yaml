                      border_color: 0x445588
                      border_width: 2
                      radius: 8
                      on_click:
                        - lambda: |-
                            id(overlay_tc_minutes) = 4;
                            lv_slider_set_value(id(slider_tc_minutes), 4, LV_ANIM_ON);
                            lv_label_set_text(id(lbl_tc_minutes_val), "4 min");
                      widgets:
                        - label:
                            text: "Dose 0,5l / 4 min"
