                            bool all_on = (id(overlay_tc_mask) & 0x3F) == 0x3F;
                            id(overlay_tc_mask) = all_on ? 0 : 0x3F;
                            lv_obj_set_style_bg_opa(id(btn_tc_s1), id(overlay_tc_mask)&(1<<0)?LV_OPA_COVER:LV_OPA_30, 0);
                            lv_obj_set_style_bg_opa(id(btn_tc_s2), id(overlay_tc_mask)&(1<<1)?LV_OPA_COVER:LV_OPA_30, 0);
                            lv_obj_set_style_bg_opa(id(btn_tc_s3), id(overlay_tc_mask)&(1<<2)?LV_OPA_COVER:LV_OPA_30, 0);
                            lv_obj_set_style_bg_opa(id(btn_tc_s4), id(overlay_tc_mask)&(1<<3)?LV_OPA_COVER:LV_OPA_30, 0);
                            lv_obj_set_style_bg_opa(id(btn_tc_s5), id(overlay_tc_mask)&(1<<4)?LV_OPA_COVER:LV_OPA_30, 0);
                            lv_obj_set_style_bg_opa(id(btn_tc_s6), id(overlay_tc_mask)&(1<<5)?LV_OPA_COVER:LV_OPA_30, 0);
