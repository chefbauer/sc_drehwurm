                      text: "0.90"
                      text_font: font_normal
                      text_color: 0xFFFF88
                      align: TOP_MID
                      y: 24

                  # Range-Balken links vom Slider (Fleissaufgabe)
                  # Glas (0.88–0.94): grün, align LEFT_MID, y=-132 (center), h=28
                  - obj:
                      width: 6
                      height: 28
                      align: LEFT_MID
                      x: 4
                      y: -132
                      bg_color: 0x22CC66
                      bg_opa: 80%
                      border_width: 0
                      radius: 2
                  # Dose matt (0.75–0.94): orange, y=-117 (center), h=65
                  - obj:
                      width: 6
                      height: 65
                      align: LEFT_MID
                      x: 12
                      y: -117
                      bg_color: 0xFF8833
                      bg_opa: 80%
                      border_width: 0
                      radius: 2
                  # Dose glänzend (0.04–0.10): blau, y=150 (center), h=22
                  - obj:
                      width: 6
                      height: 22
                      align: LEFT_MID
