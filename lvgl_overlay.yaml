            # Distanz-Bar links (10mm unten = nah, 100mm oben = weit)
            - obj:
                id: obj_dist_bar_container
                width: 120
                height: 440
                align: LEFT_MID
                x: 40
                bg_color: 0x222222
                radius: 12
                border_width: 0
                pad_all: 0
                scrollable: false
                widgets:
                  # Min/Max/Optimal Beschriftungen
                  - label:
                      text: "100mm"
                      text_font: font_small
                      text_color: 0x888888
                      align: TOP_MID
                      y: 8
                  - label:
                      text: "45mm"
                      text_font: font_small
                      text_color: 0x00FF88
                      align: CENTER
                      y: -56
                  - label:
                      id: lbl_dist_messung
                      text: "---"
                      text_font: font_normal
