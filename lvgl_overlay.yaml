                  # Dynamische Bar (nah = oben: Wert wird in Lambda gespiegelt)
                  - bar:
                      id: bar_distanz
                      width: 60
                      height: 400
                      align: CENTER
                      min_value: 10
                      max_value: 100
                      value: 60
                      mode: NORMAL
                      indicator:
                        bg_color: 0x2299FF
                      bg_color: 0x333333
                      radius: 6

            # IR-FOV-Kreis Dosen-RAND (blau, dahinter = unter rotem Kreis)
            # Physik: Dose Ø67mm → Radius 33,5mm
            # Schrägdistanz Sensor→Dosenrand: d_rand = sqrt(d² + 33,5²)
            # Kreisdurchmesser: 2 * d_rand * tan(25°) * 6,674 px/mm
            # Initialgröße Sweetspot 45mm: sqrt(45²+33,5²)≈56mm → 349px
            - obj:
                id: obj_ir_circle_blue
                width: 349
                height: 349
                align: CENTER
                x: 0
                y: 0
                bg_opa: TRANSP
                border_color: 0x4488FF
                border_width: 3
                radius: 175
                pad_all: 0
                scrollable: false

            # IR-FOV-Kreis: HINTERGRUND (zuerst = unten in Z-Order)
            # Durchmesser = 2 * dist * tan(25°) * 6.674 px/mm
            # MLX90632 FOV 50°, tan(25°)=0.46631, Display 7"/1024x600 → 6.674 px/mm
            # Initialgröße für Sweetspot 45mm: 2*45*0.46631*6.674 ≈ 280px
            - obj:
                id: obj_ir_circle
                width: 280
                height: 280
                align: CENTER
                x: 0
                y: 0
                bg_opa: TRANSP
                border_color: 0xFF4444
                border_width: 5
                radius: 140
                pad_all: 0
                scrollable: false
                widgets:
                  # Horizontale Kreuzlinie
                  - obj:
                      id: obj_cross_h
                      width: 280
                      height: 5
                      align: CENTER
                      bg_color: 0xFF4444
                      bg_opa: COVER
                      border_width: 0
                      radius: 0
                  # Vertikale Kreuzlinie
                  - obj:
                      id: obj_cross_v
                      width: 5
                      height: 280
                      align: CENTER
                      bg_color: 0xFF4444
                      bg_opa: COVER
                      border_width: 0
                      radius: 0

            # Temperatur: absolut mittig, über dem Kreis (zuletzt = vorne in Z-Order)
            # Touch auf Temp-Label → Overlay sofort schließen
            - label:
                id: lbl_ts_temp
                clickable: true
                on_click:
                  - script.execute: script_close_temp_overlay
                text: !lambda |-
                  if (isnan(id(sensor_Temp_OBJECT).state)) return std::string("--,- °C");
                  float t = id(sensor_Temp_OBJECT).state;
                  int vor = (int)t;
                  int nach = (int)(fabs(t - vor) * 10 + 0.5f);
                  char b[16];
                  snprintf(b, sizeof(b), "%d,%d °C", vor, nach);
                  return std::string(b);
                text_font: font_ts_xl
                text_color: 0xFFFFFF
                align: CENTER
                x: 0
                y: 0

            # (Distanzwert wird direkt in der Bar angezeigt via lbl_dist_messung)

            # ── Emissivitäts-Slider rechts (symmetrisch zum ToF-Bar) ──────────────
            # Physik: Slider 340px hoch, Container 440px, beide zentriert
            #   v=94 → y=-149 | v=91 → y=-139 | v=82 → y=-108 | v=6 → y=+153
