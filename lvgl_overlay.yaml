                      y: -56
                  - label:
                      id: lbl_dist_messung
                      text: "---"
                      text_font: font_normal
                      text_color: 0xFFFFFF
                      align: BOTTOM_MID
                      y: -4
                  - label:
                      text: "10mm"
                      text_font: font_small
