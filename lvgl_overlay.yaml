# ── Komponenten ──────────────────────────────────────────────────────────────────
#  lvgl / top_layer:
#    overlay_amg8833:
#      amg_grid_container, btn_amg_exit, btn_amg_mode, lbl_amg_mode
#    overlay_schwenker_settings:
#      tabview_schwenker
#      tab_schwenken:
#        btn_schwenker_overlay_toggle, lbl_overlay_schwenker_icon
#        arc_area_zeit → arc_schwenkzeit, lbl_arc_zeit_val
#        arc_area_acc  → arc_acc, lbl_arc_acc_val, lbl_trapez_shape
#        arc_area_rpm  → arc_rpm, lbl_arc_rpm_val
#        row_presets   → btn_preset[1..5], lbl_preset[1..5]_name/vals
#      tab_drehen:
#        btn_dr_start_stop
#        arc_dr_area_rpm → arc_dr_rpm, lbl_dr_rpm_val
#        arc_dr_area_acc → arc_dr_acc, lbl_dr_acc_val
#        arc_dr_controls → btn_dr_richtung/lbl_dr_richtung, btn_dr_mode/lbl_dr_mode
#        row_dr_presets  → btn_drp[1..5], lbl_drp[1..5]_name/vals
#      btn_schwenker_settings_exit (overlay-level, über TabView)
#    overlay_sensorphalanx:
#      btn_sensorphalanx_exit,
#      row_sp_tof/temp/humi/pressure/altitude/light/mlx + je badge + value_label
#    overlay_timer_cowntdown:
#      btn_tc_exit, lbl_tc_title,
#      obj_tc_slot_row → btn_tc_s1..s6, btn_tc_all
#      obj_tc_type_row → btn_tc_type_timer, btn_tc_type_cd
#      obj_tc_timer_content → btn_tc_reset
#      obj_tc_cd_content → slider_tc_minutes, lbl_tc_minutes_val,
#                           btn_tc_dose, btn_tc_flasche
#      btn_tc_ok
# ─────────────────────────────────────────────────────────────────────────────────

lvgl:
  top_layer:
    widgets:
      # ================================
      # OVERLAY: AMG8833 Live-Ansicht
      # ================================
      - obj:
          id: overlay_amg8833
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 90%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # 8×8 Grid Container (496×496 px, leicht links zentriert)
            # Zellen werden per amg_create_grid() beim ersten Öffnen erstellt
            - obj:
                id: amg_grid_container
                width: 496
                height: 496
                align: CENTER
                x: -50
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                scrollable: false

            # Exit-Button (rechts oben)
            - button:
                id: btn_amg_exit
                width: 80
                height: 60
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                widgets:
                  - label:
                      text: "X"
                      align: CENTER
                      text_font: font_normal
                      text_color: 0xFFFFFF
                on_click:
                  - lvgl.widget.hide: overlay_amg8833

            # Modus-Umschalter (rechts mitte): Normal ↔ Kalt
            - button:
                id: btn_amg_mode
                width: 80
                height: 80
                align: RIGHT_MID
                x: -10
                bg_color: 0x225599
                widgets:
                  - label:
                      id: lbl_amg_mode
                      text: "Normal"
                      align: CENTER
                      text_font: font_small
                      text_color: 0xFFFFFF
                on_click:
                  - lambda: |-
                      amg_cold_mode = !amg_cold_mode;
                      lv_label_set_text(id(lbl_amg_mode), amg_cold_mode ? "Kalt" : "Normal");
                      lv_obj_set_style_bg_color(id(btn_amg_mode),
                        amg_cold_mode ? lv_color_hex(0x0088CC) : lv_color_hex(0x225599), 0);
                      amg_refresh_cells();

      # ================================
      # OVERLAY: Sensor-Phalanx
      # MLX90632 · VL53L1X · SHT4x · BMP581 · VEML7700
      # ================================
      # OVERLAY: Schwenker-Einstellungen (TabView: Schwenken / Drehen)
      # ================================
      - obj:
          id: overlay_schwenker_settings
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: 97%
          hidden: true
          clickable: true
          pad_all: 0
          scrollable: false
          widgets:
            # ── TabView: Schwenken / Drehen ────────────────────────
            - tabview:
                id: tabview_schwenker
                width: 1024
                height: 600
                align: TOP_LEFT
                x: 0
                y: 0
                scrollable: false
                scrollbar_mode: "off"
                tab_style:
                  bg_color: 0xE8EEF8
                  text_font: font_tab
                  text_color: 0x003366
                on_value:
                  - lambda: |-
                      if (x == 1) {
                        id(script_drehen_settings_open).execute();
                      }
                tabs:
                  # ══════════════════════════════════════════════════
                  # Tab 1: Schwenken (unver\u00e4ndert)
                  # ══════════════════════════════════════════════════
                  - name: "Schwenken"
                    id: tab_schwenken
                    scrollable: false
                    widgets:
                      # \u2500\u2500 Start/Stop Button \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
                      - button:
                          id: btn_schwenker_overlay_toggle
                          width: 80
                          height: 55
                          align: TOP_LEFT
                          x: 10
                          y: 10
                          radius: 10
                          bg_color: 0x666666
                          bg_opa: COVER
                          border_width: 0
                          shadow_width: 0
                          outline_width: 0
                          pad_all: 0
                          on_press:
                            - lambda: |-
                                if (id(sw_aktiv)) {
                                  id(script_schwenker_stop).execute();
                                } else {
                                  id(script_schwenker_start).execute();
                                }
                          widgets:
                            - label:
                                id: lbl_overlay_schwenker_icon
                                align: CENTER
                                text: "\uF021"
                                text_font: font_icons
                                text_color: 0xFFFFFF

                      # \u2500\u2500 Arc 1: Schwenkzeit \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
                      - obj:
                          id: arc_area_zeit
                          width: 320
                          height: 340
                          align: TOP_LEFT
                          x: 20
                          y: 80
                          bg_opa: TRANSP
                          border_width: 0
                          scrollable: false
                          clickable: false
                          pad_all: 0
                          widgets:
                            - label:
                                text: "Schwenkzeit"
                                align: TOP_MID
                                y: 0
                                text_font: font_normal
                                text_color: 0x334455
                            - arc:
                                id: arc_schwenkzeit
                                width: 280
                                height: 280
                                align: TOP_MID
                                y: 35
                                min_value: 10      # = 1.0 s
                                max_value: 200     # = 20.0 s
                                value: 32          # = 3.2 s (default)
                                adjustable: true
                                arc_color: 0x2299FF
                                arc_width: 15
                                indicator:
                                  arc_color: 0x55EEFF
                                  arc_width: 15
                                knob:
                                  bg_color: 0x55EEFF
                                  width: 22
                                  height: 22
                                  radius: 11
                                on_value:
                                  - lambda: |-
                                      id(sw_halbperiode_ms) = (uint32_t)(x * 100);
                                      char buf[8];
                                      snprintf(buf, sizeof(buf), "%.1fs", x / 10.0f);
                                      lv_label_set_text(id(lbl_arc_zeit_val), buf);
                            - label:
                                id: lbl_arc_zeit_val
                                text: "3.2s"
                                align: TOP_MID
                                y: 140
                                text_font: font_arc_val
                                text_color: 0x0077CC
                                text_align: CENTER

                      # \u2500\u2500 Arc 2: Beschleunigung (Trapez-Rampe %) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
                      - obj:
                          id: arc_area_acc
                          width: 320
                          height: 340
                          align: TOP_MID
                          x: 0
                          y: 80
                          bg_opa: TRANSP
                          border_width: 0
                          scrollable: false
                          clickable: false
                          pad_all: 0
                          widgets:
                            - label:
                                text: "Beschleunigung"
                                align: TOP_MID
                                y: 0
                                text_font: font_normal
                                text_color: 0x334455
                            - arc:
                                id: arc_acc
                                width: 260
                                height: 260
                                align: TOP_MID
                                y: 40
                                min_value: 10
                                max_value: 100
                                value: 100
                                adjustable: true
                                arc_color: 0x885500
                                arc_width: 15
                                indicator:
                                  arc_color: 0xFF9933
                                  arc_width: 15
                                knob:
                                  bg_color: 0xFF9933
                                  width: 22
                                  height: 22
                                  radius: 11
                                on_value:
                                  - lambda: |-
                                      id(sw_acc) = (int)x;
                                      char buf[8];
                                      snprintf(buf, sizeof(buf), "%d%%", (int)x);
                                      lv_label_set_text(id(lbl_arc_acc_val), buf);
                                      const char* shape;
                                      if (x >= 80)      shape = "/\\";
                                      else if (x >= 55) shape = "/_\\";
                                      else if (x >= 35) shape = "/___\\";
                                      else              shape = "/_____\\";
                                      lv_label_set_text(id(lbl_trapez_shape), shape);
                            - label:
                                id: lbl_arc_acc_val
                                text: "100%"
                                align: TOP_MID
                                y: 148
                                text_font: font_arc_val
                                text_color: 0xCC7700
                                text_align: CENTER
                            - label:
                                id: lbl_trapez_shape
                                text: "/\\"
                                align: TOP_MID
                                y: 210
                                text_font: font_normal
                                text_color: 0xFF9933
                                text_align: CENTER

                      # \u2500\u2500 Arc 3: Max RPM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
                      - obj:
                          id: arc_area_rpm
                          width: 320
                          height: 340
                          align: TOP_RIGHT
                          x: -20
                          y: 80
                          bg_opa: TRANSP
                          border_width: 0
                          scrollable: false
                          clickable: false
                          pad_all: 0
                          widgets:
                            - label:
                                text: "Max Umdrehungen"
                                align: TOP_MID
                                y: 0
                                text_font: font_normal
                                text_color: 0x334455
                            - arc:
                                id: arc_rpm
                                width: 280
                                height: 280
                                align: TOP_MID
                                y: 35
                                min_value: 1
                                max_value: 100
                                value: 15
                                adjustable: true
                                arc_color: 0x226622
                                arc_width: 15
                                indicator:
                                  arc_color: 0x44FF88
                                  arc_width: 15
                                knob:
                                  bg_color: 0x44FF88
                                  width: 22
                                  height: 22
                                  radius: 11
                                on_value:
                                  - lambda: |-
                                      id(sw_max_speed_rpm) = (int)x;
                                      char buf[6];
                                      snprintf(buf, sizeof(buf), "%d", (int)x);
                                      lv_label_set_text(id(lbl_arc_rpm_val), buf);
                            - label:
                                id: lbl_arc_rpm_val
                                text: "4"
                                align: TOP_MID
                                y: 140
                                text_font: font_arc_val
                                text_color: 0x226644
                                text_align: CENTER
                            - label:
                                text: "Upm"
                                align: TOP_MID
                                y: 198
                                text_font: font_small
                                text_color: 0x556677

                      # \u2500\u2500 Preset-Buttons Schwenken (Short: laden, Long: speichern) \u2500\u2500
