                                      lv_label_set_text(id(lbl_arc_rpm_val), b2);
                                      char b3[8]; snprintf(b3,sizeof(b3),"%d%%",id(preset2_acc));
                                      lv_label_set_text(id(lbl_arc_acc_val), b3);
                                      int _a2=id(preset2_acc); const char* _sh2;
                                      if(_a2>=80) _sh2="/\\";
                                      else if(_a2>=55) _sh2="/_\\";
                                      else if(_a2>=35) _sh2="/___\\";
                                      else _sh2="/_____\\";
                                      lv_label_set_text(id(lbl_trapez_shape), _sh2);
                                      ESP_LOGI("preset","P2 geladen");
                                on_long_press:
                                  - lambda: |-
                                      id(preset2_hp_ms) = id(sw_halbperiode_ms);
                                      id(preset2_rpm)   = id(sw_max_speed_rpm);
                                      id(preset2_acc)   = id(sw_acc);
                                      char buf[28];
                                      snprintf(buf,sizeof(buf),"%.1fs \xc2\xb7 %d Upm \xc2\xb7 %d%%",
                                               id(preset2_hp_ms)/1000.0f,id(preset2_rpm),id(preset2_acc));
                                      lv_label_set_text(id(lbl_preset2_vals), buf);
                                      ESP_LOGI("preset","P2 gespeichert");
                            # P3
                            - button:
                                id: btn_preset3
                                width: 178
                                height: 80
                                align: LEFT_MID
                                x: 391
                                bg_color: 0x223355
                                border_width: 2
                                border_color: 0x4477AA
                                radius: 12
                                widgets:
                                  - label:
                                      id: lbl_preset3_name
                                      text: "③"
                                      align: TOP_LEFT
