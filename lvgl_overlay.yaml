      # Schließen: btn_tc_exit (X) oder btn_tc_ok (Übernehmen)
      # ═══════════════════════════════════════════════════════════════════════
      - obj:
          id: overlay_timer_cowntdown
          width: 100%
          height: 100%
          align: CENTER
          bg_color: 0x111122
          bg_opa: 94%
          border_width: 0
          pad_all: 0
          hidden: true

          widgets:
            # ── Schließen-Button (oben rechts) ─────────────────────────────
            - button:
                id: btn_tc_exit
                width: 60
                height: 60
                align: TOP_RIGHT
                x: -10
                y: 10
                bg_color: 0xCC3333
                radius: 30
                border_width: 0
