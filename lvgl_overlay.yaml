                  - slider:
                      id: slider_tc_minutes
                      width: 560
                      height: 24
                      align: TOP_MID
                      y: 8
                      min_value: 1
                      max_value: 10
                      value: 4
                      on_value:
                        - lambda: |-
                            id(overlay_tc_minutes) = (int)x;
                            char buf[16];
                            snprintf(buf, sizeof(buf), "%d min", (int)x);
                            lv_label_set_text(id(lbl_tc_minutes_val), buf);
                  - label:
                      id: lbl_tc_minutes_val
                      text: "4 min"
                      align: TOP_MID
                      y: 42
                      text_font: font_normal
                      text_color: 0xCCCCFF
