                        - lambda: |-
                            id(overlay_tc_type) = 1;
                            lv_obj_set_style_bg_color(id(btn_tc_type_cd),    lv_color_hex(0x334488), 0);
                            lv_obj_set_style_bg_color(id(btn_tc_type_timer), lv_color_hex(0x222233), 0);
                            lv_obj_add_flag(id(obj_tc_timer_content),    LV_OBJ_FLAG_HIDDEN);
                            lv_obj_clear_flag(id(obj_tc_cd_content), LV_OBJ_FLAG_HIDDEN);
                      widgets:
                        - label:
                            text: "Countdown"
                            align: CENTER
                            text_font: font_normal
                            text_color: 0xFFFFFF

            # ── Timer-Inhalt (sichtbar wenn Typ = Timer) ────────────────────
            - obj:
                id: obj_tc_timer_content
                width: 700
                height: 140
                align: TOP_MID
                y: 240
                bg_opa: 0%
                border_width: 0
                pad_all: 0

                widgets:
                  - button:
                      id: btn_tc_reset
                      width: 280
                      height: 56
                      align: CENTER
                      bg_color: 0x336633
                      border_color: 0x55AA55
                      border_width: 2
                      radius: 8
                      on_click:
                        - lambda: |-
                            // Timer-Reset für alle gewählten Slots
                            esphome::binary_sensor::BinarySensor* blink_s[6] = {
                              id(bin_slot1_blink), id(bin_slot2_blink), id(bin_slot3_blink),
                              id(bin_slot4_blink), id(bin_slot5_blink), id(bin_slot6_blink),
                            };
                            const uint32_t slot_fc[6] = {0xFF0000,0xFFFF00,0x00FF00,0x00FFFF,0x0000FF,0xFF00FF};
                            lv_obj_t* slot_tabs[6] = {
                              id(slot1_tab),id(slot2_tab),id(slot3_tab),
                              id(slot4_tab),id(slot5_tab),id(slot6_tab),
                            };
                            for (int i = 0; i < 6; i++) {
                              if (!(id(overlay_tc_mask) & (1 << i))) continue;
                              id(slot_elapsed_ms)[i] = 0;
                              id(slot_start_ms)[i]   = 0;
                              id(slot_status)[i]     = 0;
                              blink_s[i]->publish_state(false);
                              lv_obj_set_style_bg_color(slot_tabs[i], lv_color_hex(slot_fc[i]), 0);
                            }
                      widgets:
                        - label:
                            text: "Timer Reset"
                            align: CENTER
                            text_font: font_normal
                            text_color: 0xFFFFFF

            # ── Countdown-Inhalt (sichtbar wenn Typ = Countdown) ───────────
