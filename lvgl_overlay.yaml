                      text_font: font_normal
                      text_color: 0xFFFF88
                      align: TOP_MID
                      y: 24

                  # Range-Balken links vom Slider (Fleissaufgabe)
                  # Glas (0.88–0.94): grün, align LEFT_MID, y=-132 (center), h=28
                  - obj:
                      width: 6
