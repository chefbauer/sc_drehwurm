          # ══════════════════════════════════════════════════
          # Tab 2: Drehen – reiner Motorbetrieb
          # ══════════════════════════════════════════════════
          - name: "Drehen"
            id: tab_drehen
            scrollable: false
            widgets:
              # ── Start/Stop Button ──────────────────────────────────────────
              - button:
                  id: btn_dr_start_stop
                  width: 80
                  height: 55
                  align: TOP_LEFT
                  x: 10
                  y: 10
                  radius: 10
                  bg_color: 0x666666
                  bg_opa: COVER
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_press:
                    - lambda: |-
                        if (id(dr_aktiv)) {
                          id(script_drehen_stop).execute();
                        } else {
                          id(script_drehen_start).execute();
                        }
                  widgets:
                    - label:
                        align: CENTER
                        text: "\uF021"
                        text_font: font_icons
                        text_color: 0xFFFFFF

              # ── Pumpen-Auto-Button (EIN = 100% beim Drehen, AUS = manuell) ──
              - button:
                  id: btn_dr_pumpe_auto
                  width: 180
                  height: 55
                  align: TOP_LEFT
                  x: 100
                  y: 10
                  radius: 10
                  bg_color: 0x1a5a8a
                  bg_opa: COVER
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_press:
                    - lambda: |-
                        id(dr_pumpe_auto) = !id(dr_pumpe_auto);
                        if (id(dr_pumpe_auto)) {
                          lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe 100%");
                          lv_obj_set_style_bg_color(id(btn_dr_pumpe_auto), lv_color_hex(0x1a5a8a), 0);
                          // Wenn Drehmodus gerade aktiv: Pumpe sofort auf 100%
                          if (id(dr_aktiv) && id(pumpe_a_aktiv)) {
                            if (id(pumpe_vor_drehen_level) < 0.0f) {
                              id(pumpe_vor_drehen_level) = lv_slider_get_value(id(slider_turmpumpe)) / 100.0f;
                            }
                            id(output_pumpe_dacA).set_level(1.0f);
                            ESP_LOGI("drehen", "Pumpen-Auto EIN: 100%%");
                          }
                        } else {
                          lv_label_set_text(id(lbl_dr_pumpe_auto), "Pumpe: manuell");
