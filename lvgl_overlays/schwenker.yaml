obj:
  id: overlay_schwenker_settings
  width: 100%
  height: 100%
  bg_color: 0xFFFFFF
  bg_opa: 97%
  hidden: true
  clickable: true
  pad_all: 0
  scrollable: false
  widgets:
    # ── TabView: Schwenken / Drehen ────────────────────────
    - tabview:
        id: tabview_schwenker
        width: 1024
        height: 600
        align: TOP_LEFT
        x: 0
        y: 0
        scrollable: false
        scrollbar_mode: "off"
        tab_style:
          bg_color: 0xE8EEF8
          text_font: font_tab
          text_color: 0x003366
        on_value:
          - lambda: |-
              if (lv_tabview_get_tab_act(id(tabview_schwenker)) == 1) {
                id(script_drehen_settings_open).execute();
              }
        tabs:
          # ══════════════════════════════════════════════════
          # Tab 1: Schwenken (unverändert)
          # ══════════════════════════════════════════════════
          - name: "Schwenken"
            id: tab_schwenken
            scrollable: false
            widgets:
              # ── Start/Stop Button ──────────────────────────────────────────
              - button:
                  id: btn_schwenker_overlay_toggle
                  width: 80
                  height: 55
                  align: TOP_LEFT
                  x: 10
                  y: 10
                  radius: 10
                  bg_color: 0x666666
                  bg_opa: COVER
                  border_width: 0
                  shadow_width: 0
                  outline_width: 0
                  pad_all: 0
                  on_press:
                    - lambda: |-
                        if (id(sw_aktiv)) {
                          id(script_schwenker_stop).execute();
                        } else {
                          id(script_schwenker_start).execute();
                        }
                  widgets:
                    - label:
                        id: lbl_overlay_schwenker_icon
                        align: CENTER
                        text: "\uF021"
                        text_font: font_icons
                        text_color: 0xFFFFFF

              # ── Arc 1: Schwenkzeit ─────────────────────────────────────────
              - obj:
                  id: arc_area_zeit
                  width: 320
                  height: 340
                  align: TOP_LEFT
                  x: 20
                  y: 80
                  bg_opa: TRANSP
                  border_width: 0
                  scrollable: false
                  clickable: false
                  pad_all: 0
                  widgets:
                    - label:
                        text: "Schwenkzeit"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_schwenkzeit
                        width: 280
                        height: 280
                        align: TOP_MID
                        y: 35
                        min_value: 10      # = 1.0 s
                        max_value: 200     # = 20.0 s
                        value: 32          # = 3.2 s (default)
                        adjustable: true
                        arc_color: 0x2299FF
                        arc_width: 15
                        indicator:
                          arc_color: 0x55EEFF
                          arc_width: 15
                        knob:
                          bg_color: 0x55EEFF
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              id(sw_halbperiode_ms) = (uint32_t)(x * 100);
                              char buf[8];
                              snprintf(buf, sizeof(buf), "%.1fs", x / 10.0f);
                              lv_label_set_text(id(lbl_arc_zeit_val), buf);
                    - label:
                        id: lbl_arc_zeit_val
                        text: "3.2s"
                        align: TOP_MID
                        y: 140
                        text_font: font_arc_val
                        text_color: 0x0077CC
                        text_align: CENTER

              # ── Arc 2: Beschleunigung (Trapez-Rampe %) ────────────────────
              - obj:
                  id: arc_area_acc
                  width: 320
                  height: 340
                  align: TOP_MID
                  x: 0
                  y: 80
                  bg_opa: TRANSP
                  border_width: 0
                  scrollable: false
                  clickable: false
                  pad_all: 0
                  widgets:
                    - label:
                        text: "Beschleunigung"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_acc
                        width: 260
                        height: 260
                        align: TOP_MID
                        y: 40
                        min_value: 10
                        max_value: 100
                        value: 100
                        adjustable: true
                        arc_color: 0x885500
                        arc_width: 15
                        indicator:
                          arc_color: 0xFF9933
                          arc_width: 15
                        knob:
                          bg_color: 0xFF9933
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              id(sw_acc) = (int)x;
                              char buf[8];
                              snprintf(buf, sizeof(buf), "%d%%", (int)x);
                              lv_label_set_text(id(lbl_arc_acc_val), buf);
                              const char* shape;
                              if (x >= 80)      shape = "/\\";
                              else if (x >= 55) shape = "/_\\";
                              else if (x >= 35) shape = "/___\\";
                              else              shape = "/_____\\";
                              lv_label_set_text(id(lbl_trapez_shape), shape);
                    - label:
                        id: lbl_arc_acc_val
                        text: "100%"
                        align: TOP_MID
                        y: 148
                        text_font: font_arc_val
                        text_color: 0xCC7700
                        text_align: CENTER
                    - label:
                        id: lbl_trapez_shape
                        text: "/\\"
                        align: TOP_MID
                        y: 210
                        text_font: font_normal
                        text_color: 0xFF9933
                        text_align: CENTER

              # ── Arc 3: Max RPM ─────────────────────────────────────────────
              - obj:
                  id: arc_area_rpm
                  width: 320
                  height: 340
                  align: TOP_RIGHT
                  x: -20
                  y: 80
                  bg_opa: TRANSP
                  border_width: 0
                  scrollable: false
                  clickable: false
                  pad_all: 0
                  widgets:
                    - label:
                        text: "Max Umdrehungen"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_rpm
                        width: 280
                        height: 280
                        align: TOP_MID
                        y: 35
                        min_value: 1
                        max_value: 100
                        value: 15
                        adjustable: true
                        arc_color: 0x226622
                        arc_width: 15
                        indicator:
                          arc_color: 0x44FF88
                          arc_width: 15
                        knob:
                          bg_color: 0x44FF88
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              id(sw_max_speed_rpm) = (int)x;
                              char buf[6];
                              snprintf(buf, sizeof(buf), "%d", (int)x);
                              lv_label_set_text(id(lbl_arc_rpm_val), buf);
                    - label:
                        id: lbl_arc_rpm_val
                        text: "4"
                        align: TOP_MID
                        y: 140
                        text_font: font_arc_val
                        text_color: 0x226644
                        text_align: CENTER
                    - label:
                        text: "Upm"
                        align: TOP_MID
                        y: 198
                        text_font: font_small
                        text_color: 0x556677

              # ── Preset-Buttons Schwenken (Short: laden, Long: speichern) ──
