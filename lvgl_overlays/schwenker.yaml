                  bg_opa: TRANSP
                  border_width: 0
                  scrollable: false
                  clickable: false
                  pad_all: 0
                  widgets:
                    - label:
                        text: "Geschwindigkeit"
                        align: TOP_MID
                        y: 0
                        text_font: font_normal
                        text_color: 0x334455
                    - arc:
                        id: arc_dr_rpm
                        width: 260
                        height: 260
                        align: TOP_MID
                        y: 35
                        min_value: 1
                        max_value: 150
                        value: 30
                        adjustable: true
                        arc_color: 0x226622
                        arc_width: 15
                        indicator:
                          arc_color: 0x44FF88
                          arc_width: 15
                        knob:
                          bg_color: 0x44FF88
                          width: 22
                          height: 22
                          radius: 11
                        on_value:
                          - lambda: |-
                              id(dr_speed_rpm) = (int)x;
                              char buf[8];
                              snprintf(buf, sizeof(buf), "%d", (int)x);
                              lv_label_set_text(id(lbl_dr_rpm_val), buf);
                              // Rampzeit neu berechnen und anzeigen
                              float rt = (float)((int)x * 8) * (256 - id(dr_acc)) * 0.00005f;
                              char rbuf[10]; snprintf(rbuf, sizeof(rbuf), "%.1fs", rt);
                              lv_label_set_text(id(lbl_dr_ramp_info), rbuf);
                              // Live-Update: sofort an Motor senden wenn Drehmodus aktiv
                              if (id(dr_aktiv)) {
                                int speed_val = (int)x * 8;
                                uint8_t acc_b = (uint8_t)std::max(1, std::min(254, id(dr_acc)));
                                int32_t tgt   = (int32_t)(id(dr_richtung)) * 8000000;
                                uint32_t tgtv = (uint32_t)(tgt) & 0x00FFFFFFU;
                                id(can_bus)->send_data(${motor_can_id}, false,
                                    add_crc(${motor_can_id}, { 0xF5,
                                        (uint8_t)(speed_val >> 8), (uint8_t)(speed_val & 0xFF), acc_b,
                                        (uint8_t)((tgtv>>16)&0xFF), (uint8_t)((tgtv>>8)&0xFF), (uint8_t)(tgtv&0xFF) }));
                                ESP_LOGI("drehen", "Live-UPM: %d (F5=%d)", (int)x, speed_val);
                              }
