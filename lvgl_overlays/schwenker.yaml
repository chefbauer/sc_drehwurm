                        id: lbl_dr_rpm_val
                        text: "30"
                        align: TOP_MID
                        y: 138
                        text_font: font_arc_val
                        text_color: 0x226644
                        text_align: CENTER
                    - label:
                        text: "Upm (max 150)"
                        align: TOP_MID
                        y: 196
                        text_font: font_small
                        text_color: 0x556677

