                    - button:
                        id: btn_drp5
                        width: 178
                        height: 80
                        align: LEFT_MID
                        x: 771
                        bg_color: 0x223355
                        border_width: 2
                        border_color: 0x4477AA
                        radius: 12
                        widgets:
                          - label:
                              id: lbl_drp5_name
                              text: "⑤"
                              align: TOP_LEFT
                              x: 12
                              y: 8
                              text_font: font_preset_num
                              text_color: 0xFFFFFF
                          - label:
                              id: lbl_drp5_vals
                              text: "400 Upm · 0.2s · CW · FOC"
                              align: BOTTOM_MID
                              y: -8
                              text_font: font_small
                              text_color: 0xAABBFF
                        on_short_click:
                          - lambda: |-
                              id(dr_speed_rpm)  = id(drp5_rpm);
                              id(dr_acc)        = id(drp5_acc);
                              id(dr_richtung)   = id(drp5_richtung);
                              id(dr_motor_mode) = id(drp5_mode);
                              lv_arc_set_value(id(arc_dr_rpm), std::max(5, std::min(400, id(drp5_rpm))));
                              lv_arc_set_value(id(arc_dr_acc), std::max(1, std::min(30, id(drp5_acc))));
                              char _b1[8]; snprintf(_b1,sizeof(_b1),"%d",id(drp5_rpm));
                              lv_label_set_text(id(lbl_dr_rpm_val), _b1);
                              char _b2[8]; snprintf(_b2,sizeof(_b2),"%.1fs",id(drp5_acc)/10.0f);
                              lv_label_set_text(id(lbl_dr_acc_val), _b2);
                              if (id(drp5_richtung) > 0) {
                                lv_label_set_text(id(lbl_dr_richtung), "Rechts \xef\x81\x8b");
                                lv_obj_set_style_bg_color(id(btn_dr_richtung), lv_color_hex(0x1a6b4a), 0);
                              } else {
                                lv_label_set_text(id(lbl_dr_richtung), "Links \xef\x81\x8b");
                                lv_obj_set_style_bg_color(id(btn_dr_richtung), lv_color_hex(0x1a4a6b), 0);
                              }
                              if (id(drp5_mode) == 4) {
                                lv_label_set_text(id(lbl_dr_mode), "Closed Loop");
                                lv_obj_set_style_bg_color(id(btn_dr_mode), lv_color_hex(0x553388), 0);
                              } else {
                                lv_label_set_text(id(lbl_dr_mode), "FOC");
                                lv_obj_set_style_bg_color(id(btn_dr_mode), lv_color_hex(0x336688), 0);
                              }
                              ESP_LOGI("drpreset","DP5 geladen");
                        on_long_press:
                          - lambda: |-
                              id(drp5_rpm)      = id(dr_speed_rpm);
                              id(drp5_acc)      = id(dr_acc);
                              id(drp5_richtung) = id(dr_richtung);
                              id(drp5_mode)     = id(dr_motor_mode);
                              char buf[32];
                              snprintf(buf,sizeof(buf),"%d Upm \xc2\xb7 %.1fs \xc2\xb7 %s \xc2\xb7 %s",
                                       id(drp5_rpm), id(drp5_acc)/10.0f,
                                       id(drp5_richtung)>0?"CW":"CCW",
                                       id(drp5_mode)==4?"CL":"FOC");
                              lv_label_set_text(id(lbl_drp5_vals), buf);
                              ESP_LOGI("drpreset","DP5 gespeichert");

    # ── Exit-Button (liegt über dem TabView) ──────────────────────────────
    - button:
